function canonicalStoreId(name){
  if(!name) return "";
  let s = String(name).toLowerCase().trim();
  s = s.replace(/[^a-z0-9]/g,'');

  const STORE_MAP = {
    "Derbion Crown Walk": ["derbioncrownwalk","crownwalk","derbioncw","crownwalkderbion"],
    "Lister Gate": ["listergate","listerg"],
    "West Bridgford": ["westbridgford","westbridgfo","westbridgeford"],
    "Sutton Lakeside": ["suttonlakeside","lakeside"],
    "Victoria Centre": ["victoriacentre","victoriacenter","viccentre"],
    "Long Eaton": ["longeaton","longeton"],
    "Park Farm": ["parkfarm"],
    "East Leake": ["eastleake"],
    "Melton Road": ["meltonroad","meltonrd"],
    "Teal Park": ["tealpark"]
  };

  for(const key in STORE_MAP){
    if(STORE_MAP[key].some(v => s.includes(v))){
      return key;
    }
  }

  return s;
}

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').then(function(registration) {

// ===== STORE SCORECARD ENGINE =====

// --- NEW SUPPORTIVE SCORECARD ENGINE ---
function generateSupportiveStoreCard(s, p) {
    const getVal = (obj, keys) => {
        if (!obj) return 0;
        for (let k of keys) {
            if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') {
                return (typeof obj[k] === 'number') ? obj[k] : (parseFloat(obj[k]) || 0);
            }
        }
        return 0; 
    };
    
    const weekNum = s.Week || window.currentWeek || 'Current';
    const aRank = s.AreaRank || '-';
    const cRank = s.CompanyRank || '-';

    const metrics = [
        { name: "Sales", val: getVal(s, ['Sales']), prev: getVal(p, ['Sales']), inverse: false, isRaw: false },
        { name: "Product Target", val: getVal(s, ['Product']), prev: getVal(p, ['Product']), inverse: false, isRaw: false },

        { name: "ATV", val: getVal(s, ['ATV']), prev: getVal(p, ['ATV']), inverse: false, isRaw: true, prefix: '£', format: (v) => v.toFixed(2) },
        { name: "Waste", val: getVal(s, ['Waste']), prev: getVal(p, ['Waste']), inverse: true, isRaw: false },
        { name: "Labour", val: getVal(s, ['Labour']), prev: getVal(p, ['Labour']), inverse: true, isRaw: false },
        { name: "Energy", val: getVal(s, ['Energy']), prev: getVal(p, ['Energy']), inverse: true, isRaw: true, suffix: ' kWh', format: (v) => Math.round(v) },
        { name: "Hot Drinks", val: getVal(s, ['HotBev']), prev: getVal(p, ['HotBev']), inverse: false, isRaw: false },
        { name: "Hot Food", val: getVal(s, ['HotRolls']), prev: getVal(p, ['HotRolls']), inverse: false, isRaw: false },
        { name: "Cold Rolls", val: getVal(s, ['FilledRolls']), prev: getVal(p, ['FilledRolls']), inverse: false, isRaw: false },
        { name: "Sandwiches", val: getVal(s, ['Sandwiches']), prev: getVal(p, ['Sandwiches']), inverse: false, isRaw: false }
    ];

    metrics.forEach(m => {
        if (m.isRaw) {
            m.displayVal = (m.prefix || '') + (m.format ? m.format(m.val) : m.val) + (m.suffix || '');
            m.variance = (m.prev !== 0 && m.prev !== undefined) ? (m.val - m.prev) / Math.abs(m.prev) : 0;
        } else {
            m.displayVal = (m.val * 100).toFixed(1) + '%';
            m.variance = m.val - m.prev;
        }
        m.impact = m.inverse ? -m.variance : m.variance; 
    });

    const validMetrics = metrics.sort((a, b) => b.impact - a.impact);

    // SUPPORTIVE COACHING LOGIC
    let winning = validMetrics.filter(m => m.impact >= 0);
    let negativeMetrics = validMetrics.filter(m => m.impact < 0);
    
    // Extract max 2 absolute worst metrics for "Focus", the rest become "Neutral" stats
    let focus = negativeMetrics.slice(-2).reverse(); 
    let neutral = negativeMetrics.slice(0, -2);

    const formatDiff = (val) => {
        if (val > 0) return `▲ +${(val * 100).toFixed(1)}%`;
        if (val < 0) return `▼ ${Math.abs(val * 100).toFixed(1)}%`;
        return `- 0.0%`;
    };

    const renderPill = (m, category) => {
        let bgClass, trendCol;
        if (category === 'win') {
            bgClass = ' text-emerald-900 border-emerald-200';
            trendCol = 'text-emerald-700';
        } else if (category === 'focus') {
            bgClass = 'bg-amber-50 text-amber-900 border-amber-200';
            trendCol = 'text-amber-700';
        } else {
            // Neutral style for metrics that are negative but not the core focus
            bgClass = 'bg-slate-50 text-slate-700 border-slate-200 opacity-90';
            trendCol = 'text-slate-500';
        }
        
        return `
            <div class="flex flex-col sm:flex-row sm:items-center justify-between p-5 rounded-xl border ${bgClass} shadow-sm gap-2">
                <span class="text-base md:text-lg font-black leading-tight">${m.name}</span>
                <div class="flex flex-row sm:flex-col items-center sm:items-end justify-between sm:justify-center w-full sm:w-auto shrink-0 gap-2 sm:gap-0">
                    <span class="text-sm opacity-80 font-medium mb-0.5">${m.displayVal}</span>
                    <span class="text-base font-black ${trendCol}">${formatDiff(m.variance)}</span>
                </div>
            </div>
        `;
    };
    
    const renderRank = (title, current, prev) => {
        if (!current || current === '-') return '';
        let changeHtml = '<span class="text-slate-400 font-bold text-xs">-</span>';
        if (prev && current !== '-' && prev !== '-') {
            const diff = prev - current;
            if (diff > 0) changeHtml = `<span class="text-emerald-600 font-bold text-xs">▲ +${diff}</span>`;
            else if (diff < 0) changeHtml = `<span class="text-amber-600 font-bold text-xs">▼ ${Math.abs(diff)}</span>`;
        }
        return `
        <div class="flex flex-col bg-slate-50 px-4 py-2.5 rounded-xl border border-slate-200 min-w-[85px] items-center justify-center shadow-sm">
            <span class="text-[10px] uppercase font-bold text-slate-500 mb-1 tracking-wide">${title}</span>
            <div class="flex items-center gap-2">
                <span class="text-xl font-black text-slate-800">#${current}</span>
                ${changeHtml}
            </div>
        </div>`;
    };

    const safeId = "card-" + s.Branch.replace(/[ 	]+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');

    return `
      <div id="${safeId}" class="bg-white p-6 rounded-2xl shadow-md flex flex-col gap-4 border border-slate-200 relative mt-4">
        
        <button onclick="exportToPNG('${safeId}', 'Scorecard_${s.Branch}')" class="export-btn absolute top-6 right-6 bg-slate-100 hover:bg-slate-200 p-2.5 rounded-lg text-slate-600 transition-colors shadow-sm" title="Download as PNG">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        </button>

        <div class="flex flex-col md:flex-row md:justify-between md:items-start gap-2 border-b border-slate-100 pb-4 pr-14">
          <div class="flex flex-col gap-2.5">
              <div class="flex items-center gap-3">
                  <h2 class="font-black text-[36px] text-slate-800 tracking-tight">${s.Branch}</h2>
                  <span class="text-xs font-black text-blue-700 bg-blue-50 border border-blue-200 px-3 py-1 rounded-md shadow-sm">Wk ${weekNum}</span>
              </div>
              <div class="flex items-center gap-2">
                  <span class="text-sm font-bold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-md">${s.AM || 'Store Manager'}
${(window.storeMedalsMap && window.storeMedalsMap[s.Branch]) ? `<div class="mt-2 flex flex-wrap gap-1">${window.storeMedalsMap[s.Branch].map(m=>{const isImp=m.includes('(Improvement)');return `<span class="text-[10px] font-black px-2 py-1 rounded-md border ${isImp?'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-amber-50 text-amber-700 border-amber-200'}">${isImp?'📈':'🥇'} ${m.replace(' (Improvement)','')}</span>`}).join('')}</div>`:''}</span>
              </div>
              <div class="text-xs font-bold text-emerald-700 flex items-center gap-1.5  px-3 py-1.5 rounded-md border border-emerald-200 w-fit mt-1">
                🏅 ${winning.length} Metrics Improved This Week!
              </div>
          </div>
          <div class="flex gap-4">
              ${renderRank('Area Rank', aRank, p?.AreaRank)}
              ${renderRank('Network Rank', cRank, p?.CompanyRank)}
          </div>
        </div>

        <div class="flex flex-col gap-6">
            <div>
                <h3 class="text-sm uppercase tracking-widest font-black text-slate-400 mb-4 pl-1">📊 Weekly Highlights & Tracking</h3>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    ${winning.map(m => renderPill(m, 'win')).join('')}
                    ${neutral.map(m => renderPill(m, 'neutral')).join('')}
                    ${(winning.length === 0 && neutral.length === 0) ? '<span class="text-sm text-slate-400 italic pl-1">No data available.</span>' : ''}
                </div>
            </div>

            ${focus.length > 0 ? `
            <div class="pt-2">
                <h3 class="text-sm uppercase tracking-widest font-black text-amber-600 mb-4 pl-1">🧭 Core Focus Areas</h3>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    ${focus.map(m => renderPill(m, 'focus')).join('')}
                </div>
            </div>
            ` : `
            <div class=" rounded-xl p-5 text-center border border-emerald-200 shadow-sm">
                <span class="text-base font-bold text-emerald-700">🌟 Exceptional week! No negative trends to focus on.</span>
            </div>
            `}
        </div>
      </div>`;
}


function buildInsightTop3(store, rankMaps, prevRankMaps){
  const metrics = [
    {k:'Sales', asc:false},
    {k:'Product', asc:false},
    {k:'Waste', asc:true},
    {k:'Labour', asc:true},
    {k:'HotBev', asc:false}
  ];

  return metrics.map(m=>{
    const r = rankMaps[m.k].get(canonicalStoreId(store.Branch));
    const pr = prevRankMaps[m.k]?.get(canonicalStoreId(store.Branch));
    const change = pr ? pr - r : 0;
    return {name:m.k, rank:r, change};
  }).sort((a,b)=>a.rank - b.rank).slice(0,3);
}

function buildOpportunities(store, rankMaps){
  return Object.keys(rankMaps)
    .map(k=>({name:k, rank:rankMaps[k].get(canonicalStoreId(store.Branch))}))
    .sort((a,b)=>b.rank - a.rank)
    .slice(0,2);
}



function row(name,val,prev,inverse=false){
  const trend = getTrendStr(val, prev, inverse);
  return `<div class="kpi-row"><span>${name}</span><span>${(val*100).toFixed(1)}% ${trend}</span></div>`;
}



async function exportStoreCardsZip(){
  const zip = new JSZip();
  let i = 1;

  for(const c of document.querySelectorAll('.area-card-export')){
    const canvas = await html2canvas(c);
    zip.file('store_'+i+'.png', canvas.toDataURL().split(',')[1], {base64:true});
    i++;
  }

  const blob = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'store_scorecards.zip';
  a.click();
}

function parseVal(v){
  if(v === undefined || v === null || v === '') return 0;
  let s = String(v).trim();
  const m = s.match(/-?\d+(?:\.\d+)?/);
  if(!m) return 0;
  let num = parseFloat(m[0]);
  return s.includes('%') ? num/100 : num;
}
function _finiteOr0(x){ x = Number(x); return Number.isFinite(x) ? x : 0; }
function _clamp(x, lo, hi){ x = _finiteOr0(x); return Math.max(lo, Math.min(hi, x)); }

function _fixRatio(v, {allowNegative=false} = {}){
  v = _finiteOr0(v);
  if (!Number.isFinite(v)) return 0;
  if (Math.abs(v) > 1.5 && Math.abs(v) <= 200) v = v / 100;
  if (Math.abs(v) > 1.5 && Math.abs(v) <= 20000) v = v / 10000;
  if (Math.abs(v) > 1.5) v = 0;
  return _clamp(v, allowNegative ? -1 : 0, 1);
}

function _fixATV(v){ v = _finiteOr0(v); if (v < 0) v = 0; if (v > 100 && v <= 10000) v = v / 100; return _clamp(v, 0, 200); }
function _fixEnergy(v){ v = _finiteOr0(v); if (v < 0) v = Math.abs(v); if (v > 0 && v < 1) v = 0; return _clamp(v, 0, 50000); }
function _fixScore100(v){ v = _finiteOr0(v); if (v > 0 && v <= 1.5) v = v * 100; return _clamp(v, 0, 100); }

async function validateAndCorrectData(weeksTouched){
  try {
    const kpis = await idbGetAll('kpi');
    for (const rec of kpis) {
      if (Array.isArray(weeksTouched) && weeksTouched.length && !weeksTouched.includes(rec.Week)) continue;
      const fixed = { ...rec };
      if (fixed.__rawSales === undefined) fixed.__rawSales = (rec.SalesActual !== undefined ? rec.SalesActual : rec.Sales);
      if (fixed.__rawProduct === undefined) fixed.__rawProduct = rec.Product;
      if (fixed.__rawWaste === undefined) fixed.__rawWaste = rec.Waste;
      if (fixed.__rawLabour === undefined) fixed.__rawLabour = rec.Labour;
      if (fixed.__rawATV === undefined) fixed.__rawATV = rec.ATV;
      if (fixed.__rawEnergy === undefined) fixed.__rawEnergy = rec.Energy;

      fixed.Sales = _fixRatio(rec.Sales, {allowNegative:true});
      fixed.Product = _fixRatio(rec.Product, {allowNegative:true});
      fixed.Waste = _fixRatio(rec.Waste, {allowNegative:false});
      fixed.Labour = _fixRatio(rec.Labour, {allowNegative:false});
      fixed.ATV = _fixATV(rec.ATV);
      fixed.Energy = _fixEnergy(rec.Energy);
      fixed.FilledRolls = _fixRatio(rec.FilledRolls, {allowNegative:true});
      fixed.Sandwiches = _fixRatio(rec.Sandwiches, {allowNegative:true});
      fixed.HotRolls = _fixRatio(rec.HotRolls, {allowNegative:true});
      fixed.HotBev = _fixRatio(rec.HotBev, {allowNegative:true});
      await idbPut('kpi', fixed);
    }
    const audits = await idbGetAll('audits');
    for (const rec of audits) {
      if (Array.isArray(weeksTouched) && weeksTouched.length && !weeksTouched.includes(rec.Week)) continue;
      const fixed = { ...rec };
      if (fixed.__rawScore === undefined) fixed.__rawScore = rec.Score;
      if (fixed.__rawFood === undefined) fixed.__rawFood = rec.Food;
      if (fixed.__rawFire === undefined) fixed.__rawFire = rec.Fire;
      if (fixed.__rawHandS === undefined) fixed.__rawHandS = rec.HandS;
      if (fixed.__rawJourney === undefined) fixed.__rawJourney = rec.Journey;
      if (fixed.__rawCoffee === undefined) fixed.__rawCoffee = rec.Coffee;
      if (fixed.__rawFocus === undefined) fixed.__rawFocus = rec.Focus;

      fixed.Score = _fixScore100(rec.Score);
      fixed.Food = _fixScore100(rec.Food);
      fixed.Fire = _fixScore100(rec.Fire);
      fixed.HandS = _fixScore100(rec.HandS);
      fixed.Journey = _fixScore100(rec.Journey);
      fixed.Coffee = _fixScore100(rec.Coffee);
      fixed.Focus = _fixScore100(rec.Focus);
      await idbPut('audits', fixed);
    }
  } catch (e) {
    console.warn('Post-ingest validation failed:', e);
  }
}

// THE NEW, FORGIVING ANOMALY DETECTION ENGINE
async function flagAnomalies() {
    try {
        const kpis = await idbGetAll('kpi');
        const byBranch = {};
        
        kpis.forEach(k => {
            if (!byBranch[k.Branch]) byBranch[k.Branch] = [];
            byBranch[k.Branch].push(k);
        });

        for (const branch in byBranch) {
            // Sort chronologically to simulate timeline
            const stores = byBranch[branch].sort((a,b) => {
               if ((a.Year || 0) !== (b.Year || 0)) return (a.Year || 0) - (b.Year || 0);
               return (a.Week || 0) - (b.Week || 0);
            });
            
            let lastValidSales = null;
            
            for (let i = 0; i < stores.length; i++) {
               const curr = stores[i];
               let isAnomaly = false;
               
               // FIXED Rule 1: True closures only. 
               // Removed the "Labour <= 0" check in case wage data was just missing from the sheet.
               if (curr.Sales <= -0.90 || curr.__rawSales === 0 || curr.__rawSales === '0') {
                   isAnomaly = true;
               } 
               // FIXED Rule 2: Relaxed from 30% to 80% drop.
               // This allows natural sales dips without wiping out the data, 
               // but still catches a store that had to close for 5 out of 7 days.
               else if (lastValidSales !== null && (lastValidSales - curr.Sales) >= 0.80) {
                   isAnomaly = true;
               }

               curr.IsAnomaly = isAnomaly;
               await idbPut('kpi', curr);

               // Rule 3: Baseline Memory Update
               // Only update the baseline if the week was "normal"
               if (!isAnomaly) {
                   lastValidSales = curr.Sales;
               }
            }
        }
    } catch (e) {
        console.warn('Anomaly flagging failed:', e);
    }
}

async function recordPersistentWinnersForWeeks(year, weeks){

    if(!wkKpis.length) continue;

    const pWk = week === 1 ? 52 : week - 1;
    const pYr = week === 1 ? year - 1 : year;
    // Exclude anomalies from previous baseline comparisons
    const prevKpis = kpis.filter(k => (k.Year ?? pYr) === pYr && k.Week === pWk &&  !k.IsAnomaly);

  try{
    const prevById = new Map(prevKpis.map(p=>[canonicalStoreId(p.Branch), p]));
    let bestMI = null;
    for(const c of wkKpis){
      const p = prevById.get(canonicalStoreId(c.Branch));
      if(!p) continue;
      const delta = (_finiteOr0(c.Sales) - _finiteOr0(p.Sales));
      if(!bestMI || delta > bestMI.delta) bestMI = { Branch: c.Branch, delta };
    }
    if(bestMI && bestMI.delta > 0){
      await idbPut('store_winners_log', { Year: year, Week: week, Metric: 'Most Improved', Branch: bestMI.Branch });
    }
  }catch(e){ console.warn('MostImproved skipped', e); }

    const metrics = [
      { id: 'Sales', order: 'desc' }, { id: 'Product', order: 'desc' },
      { id: 'Waste', order: 'asc' }, { id: 'Labour', order: 'asc' },
      { id: 'ATV', order: 'desc' }, { id: 'Energy', order: 'asc' }
    ];

    const areaImprovementPoints = {};
    validAMs.forEach(am => areaImprovementPoints[am] = 0);

    metrics.forEach(m => {
      const areaDeltas = validAMs.map(am => {
        const curr = wkKpis.filter(k => k.AM === am);
        const prev = prevKpis.filter(k => k.AM === am);
        if(!curr.length || !prev.length) return { am, gain: -999999 };
        const cAvg = curr.reduce((a,b) => a + (_finiteOr0(b[m.id])), 0) / curr.length;
        const pAvg = prev.reduce((a,b) => a + (_finiteOr0(b[m.id])), 0) / prev.length;
        const gain = m.order === 'desc' ? (cAvg - pAvg) : (pAvg - cAvg);
        return { am, gain };
      });
      areaDeltas.sort((a,b) => b.gain - a.gain);
      areaDeltas.forEach((item, idx) => { areaImprovementPoints[item.am] += (5 - idx); });
    });

    const winner = Object.entries(areaImprovementPoints).sort((a,b) => b[1] - a[1])[0];
    if(winner) { await idbPut('area_winners_log', { Year: year, Week: week, Winner: winner[0], Score: winner[1] }); }

    for(const am of validAMs){

  const areaStores = wkKpis.filter(k => k.AM === am);
  const prevStores = prevKpis.filter(k => k.AM === am);

  for(const m of metrics){

    let validStores = areaStores;
    if (m.order === 'asc'){
      validStores = areaStores.filter(x => _finiteOr0(x[m.id]) > 0);
    }

    if(!validStores.length) continue;

    // PERFORMANCE WINNER
    const sorted = [...validStores].sort((a,b)=>
      m.order==='desc'
        ? (_finiteOr0(b[m.id])-_finiteOr0(a[m.id]))
        : (_finiteOr0(a[m.id])-_finiteOr0(b[m.id]))
    );

    if(sorted[0]){
      await idbPut('store_winners_log',{
        Year: year,
        Week: week,
        Metric: m.id,
        Branch: sorted[0].Branch
      });
    }

    // TREND WINNER
    const trendWinner = calculateTrendWinner(validStores, prevStores, m.id, m.order === 'asc');

    if(trendWinner && trendWinner.change > 0){
      await idbPut('store_winners_log',{
        Year: year,
        Week: week,
        Metric: m.id + " (Improvement)",
        Branch: trendWinner.branch
      });
    }

  }
}
  }
}

function _periodWeeks(period, latestWeek){
  const maxW = Math.max(1, latestWeek||1);
  if(period==='q1') return {from:1, to:Math.min(13,maxW)};
  if(period==='q2') return {from:14, to:Math.min(26,maxW)};
  if(period==='q3') return {from:27, to:Math.min(39,maxW)};
  if(period==='q4') return {from:40, to:Math.min(53,maxW)};
  return {from:1, to:maxW};
}

function findCols(rows){
  for(let r=0; r<Math.min(rows.length, 30); r++){
    if(!rows[r]) continue;
    let maxCols = Math.max(rows[r].length || 0, (rows[r+1] ? rows[r+1].length : 0) || 0);
    let headers = [];
    for(let c=0; c<maxCols; c++) {
      let h1 = String(rows[r][c] || '').toLowerCase().replace(/[^a-z0-9%]+/g, '');
      let h2 = (rows[r+1] && rows[r+1][c]) ? String(rows[r+1][c] || '').toLowerCase().replace(/[^a-z0-9%]+/g, '') : '';
      headers.push(h1 + h2);
    }
    const idxB = headers.findIndex(x => x === 'branch' || x === 'store' || x === 'shop' || x.includes('branchname') || x === 'name');
    if(idxB >= 0) {
      let hasSubHeader = rows[r+1] && rows[r+1].some(x => String(x).toLowerCase().includes('actual') || String(x).toLowerCase().includes('target'));
      let idxS = headers.findIndex(x => x.includes('salesdifference'));
      if(idxS === -1) {
          let actS = headers.findIndex(x => x.includes('actualsales') || x === 'sales');
          if(actS !== -1 && headers[actS+1] && headers[actS+1].includes('difference')) idxS = actS + 1;
      }
          // NEW: capture Actual Sales (£) column for size-based banding
    let idxSA = headers.findIndex(x => String(x||'').includes('actualsales'));
let idxL = headers.findIndex(x => x.includes('wagesasa%') || x.includes('wagesas') || x.includes('labour%') || x.includes('wages%'));
      const baseProduct = headers.findIndex(x => x.includes('producttarget'));
      const baseFR = headers.findIndex(x => x.includes('filledrollsactual') || x.includes('filledrolls'));
      const baseSW = headers.findIndex(x => x.includes('sandwichesactual') || x.includes('sandwiches'));
      const baseHR = headers.findIndex(x => x.includes('filledrollhotactual') || x.includes('filledrollhot'));
      const baseHB = headers.findIndex(x => x.includes('hotbeverageactual') || x.includes('hotbeverage'));
      return {
        hr: hasSubHeader ? r + 1 : r, idxB: idxB, idxS: idxS, idxSA: idxSA,
        idxP: baseProduct >= 0 ? baseProduct + 2 : -1,
        idxW: headers.findIndex(x => x.includes('waste%') || x.includes('wastage') || x === 'waste'), 
        idxL: idxL, idxA: headers.findIndex(x => x.includes('atv') && !x.includes('target')), 
        idxE: headers.findIndex(x => x.includes('energy') || x.includes('green') || x.includes('kwh')),
        idxFR: baseFR >= 0 ? baseFR + 2 : -1, idxSW: baseSW >= 0 ? baseSW + 2 : -1,
        idxHR: baseHR >= 0 ? baseHR + 2 : -1, idxHB: baseHB >= 0 ? baseHB + 2 : -1
      };
    }
  }
  return null;
}

function parseDateSafe(val) {
    if(!val || String(val).includes('#')) return null;
    if(!isNaN(val) && Number(val) > 20000 && Number(val) < 100000) return new Date(Math.round((Number(val) - 25569)*86400*1000));
    let s = String(val).trim();
    let d = new Date(s);
    if(isNaN(d.getTime())) {
        const ukDateMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
        if(ukDateMatch) {
            let year = parseInt(ukDateMatch[3], 10);
            if(year < 100) year += 2000;
            return new Date(year, parseInt(ukDateMatch[2], 10) - 1, parseInt(ukDateMatch[1], 10));
        }
        return null;
    }
    return d;
}

const MAX_WEEK = 52; let __ingestMem = []; let __missingByYear = {};
function resolveWeekYear(fileName, wb){
  let week = 0; let year = 0; let evidence = [];
  const mW = fileName.match(/Wk\s*(\d{1,2})/i); if(mW){ week = parseInt(mW[1],10); evidence.push('filename:Wk'+week); }
  const mY = fileName.match(/(20\d{2})/); if(mY){ year = parseInt(mY[1],10); evidence.push('filename:'+year); }
  if(week && (week<1 || week>MAX_WEEK)) week = 0; if(year && year<2000) year = 0;
  return {week, year, evidence:evidence.join(',')};
}

function calculateTrendSummary(storeSeries, companySeries, inverse=false){
  let under=0, near=0, above=0;
  let total=0;
  for(let i=0;i<storeSeries.length;i++){
    const s = storeSeries[i];
    const c = companySeries[i];
    if(s==null || c==null) continue;
    const diff = s - c;
    total++;
    const withinBand = Math.abs(diff) <= 1;
    if(inverse){
      if(diff < -1) under++; // GOOD
      else if(withinBand) near++;
      else above++;
    } else {
      if(diff > 1) above++; // GOOD
      else if(withinBand) near++;
      else under++;
    }
  }
  if(total===0) return {under:0,near:0,above:0};
  return {
    under: Math.round((under/total)*100),
    near: Math.round((near/total)*100),
    above: Math.round((above/total)*100)
  }
}

function getTrendStr(currVal, prevVal, isInverse=false, format='percent') {
 if(prevVal === undefined || isNaN(prevVal) || currVal === prevVal) return `<div class="trend-wrap"><span class="trend-flat">—</span><div class="spark spark-flat"></div></div>`;
 const diff = currVal - prevVal; const absDiff = Math.abs(diff); let fmt = '';
 if(format === 'percent') fmt = `${(absDiff*100).toFixed(1)}%`; else if(format === 'currency') fmt = `£${absDiff.toFixed(2)}`; else if(format === 'whole') fmt = absDiff.toFixed(0); else if(format === 'decimal') fmt = absDiff.toFixed(1);
 const good = isInverse ? diff < 0 : diff > 0; const arrow = diff > 0 ? '▲' : '▼';
 return good ? `<div class="trend-wrap"><span class="trend-up">${arrow} ${fmt}</span><div class="spark spark-up"></div></div>` : `<div class="trend-wrap"><span class="trend-down">${arrow} ${fmt}</span><div class="spark spark-down"></div></div>`;
}

        </div>
    `;
}

function buildInsightTop3(store, rankMaps, prevRankMaps){
  const metrics = [
    {k:'Sales', asc:false},
    {k:'Product', asc:false},
    {k:'Waste', asc:true},
    {k:'Labour', asc:true},
    {k:'HotBev', asc:false}
  ];

  return metrics.map(m=>{
    const r = rankMaps[m.k].get(canonicalStoreId(store.Branch));
    const pr = prevRankMaps[m.k]?.get(canonicalStoreId(store.Branch));
    const change = pr ? pr - r : 0;
    return {name:m.k, rank:r, change};
  }).sort((a,b)=>a.rank - b.rank).slice(0,3);
}

function buildOpportunities(store, rankMaps){
  return Object.keys(rankMaps)
    .map(k=>({name:k, rank:rankMaps[k].get(canonicalStoreId(store.Branch))}))
    .sort((a,b)=>b.rank - a.rank)
    .slice(0,2);
}



function row(name,val,prev,inverse=false){
  const trend = getTrendStr(val, prev, inverse);
  return `<div class="kpi-row"><span>${name}</span><span>${(val*100).toFixed(1)}% ${trend}</span></div>`;
}

}

<script>
// ===============================
// SALES SIZE BANDing View (A–D by £ Sales) — YTD Investment Score + Drop Risk
// Band = purely store size (Actual Sales £, Year-to-Date). Score = how well the store controls/maximises the investment within its size band (YTD).
// Drop Risk flags warn if recent turnover or operational control is materially below the store’s own YTD baseline.
// ===============================
function _fmtMoney(n){
  const x = Number(n)||0;
  try{ return '£' + Math.round(x).toLocaleString('en-GB'); }catch(e){ return '£' + Math.round(x); }
}
function _fmtPct(n, dp=1){
  const x = Number(n);
  if(!Number.isFinite(x)) return '—';
  return (x*100).toFixed(dp) + '%';
}
function _safe(n){ n = Number(n); return Number.isFinite(n) ? n : 0; }
function _median(arr){
  const a = arr.filter(v=>Number.isFinite(v)).slice().sort((x,y)=>x-y);
  if(!a.length) return 0;
  const mid = Math.floor(a.length/2);
  return a.length%2 ? a[mid] : (a[mid-1]+a[mid])/2;
}
function _mad(arr){
  const med = _median(arr);
  const dev = arr.map(v=>Math.abs(v-med));
  return _median(dev) || 1;
}
function _zRobust(v, arr){
  const med = _median(arr);
  const mad = _mad(arr);
  return (v - med) / mad;
}
function _bandLabel(i){
  return i===0 ? 'Band A (Largest Stores)' : (i===1 ? 'Band B' : (i===2 ? 'Band C' : 'Band D (Smallest Stores)'));
}
function _ragFromScore(score){
  const s = _safe(score);
  if(s >= 75) return {label:'GREEN', cls:'text-emerald-700 bg-emerald-50 border-emerald-200', icon:'🟢'};
  if(s >= 50) return {label:'AMBER', cls:'text-amber-700 bg-amber-50 border-amber-200', icon:'🟠'};
  return {label:'RED', cls:'text-rose-700 bg-rose-50 border-rose-200', icon:'🔴'};
}
function _riskBadge(risk){
  if(!risk) return '<span class="text-[10px] font-black text-slate-400">—</span>';
  const cls = risk.level==='high' ? 'text-rose-700 bg-rose-50 border-rose-200'
            : (risk.level==='med' ? 'text-amber-700 bg-amber-50 border-amber-200'
            : 'text-slate-700 bg-slate-50 border-slate-200');
  const icon = risk.level==='high' ? '⚠️' : (risk.level==='med' ? '👀' : 'ℹ️');
  return `<span class="text-[10px] font-black ${cls} px-2 py-1 rounded-md border">${icon} ${risk.label}</span>`;
}

async function renderBandingView(){
  const mv = document.getElementById('mainView');
  if(!mv) return;

  const rawKpisAll = await idbGetAll('kpi');
  if(!rawKpisAll || rawKpisAll.length === 0){
    mv.innerHTML = `
      <div class="card p-10 text-center">
        <h2 class="text-2xl font-black outfit birds-green mb-2">📊 Sales Banding (YTD)</h2>
        <p class="text-slate-500 font-bold">No KPI data found yet.</p>
        <p class="text-slate-400 text-sm mt-2">Click <b>🔄 Refresh Data</b> to ingest weekly files, then re-open this view.</p>
      </div>`;
    return;
  }

  // Effective year + latest week
  const years = rawKpisAll.map(k=>k.Year).filter(y=>Number.isFinite(Number(y)));
  const effectiveYear = years.length ? Math.max(...years.map(Number)) : (new Date().getFullYear());
  const yearKpis = rawKpisAll.filter(k => (Number(k.Year)||effectiveYear) === effectiveYear);
  const latestWeek = yearKpis.length ? Math.max(...yearKpis.map(k=>Number(k.Week)||0)) : 0;

  const weekTo = latestWeek || 1;
  const periodLabel = `Year to Date (Wk 1–${weekTo})`;

  // Recent window used only for risk checks
  const recentTo = weekTo;
  const recentFrom = Math.max(1, recentTo - 3);

  const filterRows = (fromW, toW) => yearKpis.filter(k => {
    const w = Number(k.Week)||0;
    if(!w) return false;
    if(w < fromW || w > toW) return false;
    if(k.IsAnomaly) return false;
    
    return true;
  });

  const ytdRows = filterRows(1, weekTo);
  if(!ytdRows.length){
    mv.innerHTML = `
      <div class="card p-10 text-center">
        <h2 class="text-2xl font-black outfit birds-green mb-2">📊 Sales Banding (YTD)</h2>
        <p class="text-slate-500 font-bold">No usable KPI rows were found for ${periodLabel}.</p>
      </div>`;
    return;
  }
  const recentRows = filterRows(recentFrom, recentTo);

  function buildStoreAgg(rows){
    const byStore = new Map();
    for(const k of rows){
      const branch = k.Branch;
      if(!branch) continue;
      const id = canonicalStoreId(branch);
      if(!byStore.has(id)){
        byStore.set(id, { Branch: branch, AM: k.AM, weeks: 0, salesTotal: 0, salesDiffSum: 0, productSum: 0, wasteSum: 0, labourSum: 0, atvSum: 0, energySum: 0 });
      }
      const s = byStore.get(id);
      s.weeks += 1;

      const actual = (k.__rawSales !== undefined && k.__rawSales !== null) ? Number(k.__rawSales)
                   : (k.SalesActual !== undefined && k.SalesActual !== null) ? Number(k.SalesActual)
                   : 0;
      if(Number.isFinite(actual) && actual > 0) s.salesTotal += actual;

      s.salesDiffSum += _safe(k.Sales);
      s.productSum   += _safe(k.Product);
      s.wasteSum     += _safe(k.Waste);
      s.labourSum    += _safe(k.Labour);
      s.atvSum       += _safe(k.ATV);
      s.energySum    += _safe(k.Energy);
    }

    return Array.from(byStore.values()).map(s => {
      const n = Math.max(1, s.weeks);
      const salesTotal = _safe(s.salesTotal);
      const energy = _safe(s.energySum) / n;
      const energyPerSales = (salesTotal > 0) ? (energy / salesTotal) : 0;
      return {
        Branch: s.Branch,
        AM: s.AM,
        weeks: n,
        SalesTotal: salesTotal,
        AvgWeeklySales: salesTotal / n,
        SalesDiff: s.salesDiffSum / n,
        Product: s.productSum / n,
        Waste: s.wasteSum / n,
        Labour: s.labourSum / n,
        ATV: s.atvSum / n,
        Energy: energy,
        EnergyPerSales: energyPerSales
      };
    });
  }

  let ytdStores = buildStoreAgg(ytdRows);
  const volSum = ytdStores.reduce((a,b)=>a+_safe(b.SalesTotal),0);
  if(!(volSum > 0)){
    mv.innerHTML = `
      <div class="card p-10 text-center">
        <h2 class="text-2xl font-black outfit birds-green mb-2">📊 Sales Banding (YTD)</h2>
        <p class="text-slate-500 font-bold">I can’t see any <b>Actual Sales (£)</b> values in your KPI records yet.</p>
        <p class="text-slate-400 text-sm mt-2">Use this updated file, then click <b>🔄 Refresh Data</b> so the ingest captures <b>Actual Sales</b> from your weekly spreadsheets.</p>
      </div>`;
    return;
  }

  const recentStores = buildStoreAgg(recentRows);
  const recentById = new Map(recentStores.map(s=>[String(s.Branch).trim().toLowerCase(), s]));

  // Band purely by YTD £ Sales
  ytdStores.sort((a,b)=> _safe(b.SalesTotal) - _safe(a.SalesTotal));
  const nStores = ytdStores.length;
  const q = Math.ceil(nStores / 4) || 1;
  const bands = [
    { name: _bandLabel(0), stores: ytdStores.slice(0, q) },
    { name: _bandLabel(1), stores: ytdStores.slice(q, q*2) },
    { name: _bandLabel(2), stores: ytdStores.slice(q*2, q*3) },
    { name: _bandLabel(3), stores: ytdStores.slice(q*3) },
  ].filter(b=>b.stores && b.stores.length);

  // Efficiency score (YTD) within each band
  function computeEfficiencyIndex(list){
    const arrSalesDiff = list.map(s=>_safe(s.SalesDiff));
    const arrProd      = list.map(s=>_safe(s.Product));
    const arrWaste     = list.map(s=>_safe(s.Waste));
    const arrLab       = list.map(s=>_safe(s.Labour));
    const arrATV       = list.map(s=>_safe(s.ATV));
    const arrEps       = list.map(s=>_safe(s.EnergyPerSales));
    list.forEach(s => {
      const zSales = _zRobust(_safe(s.SalesDiff), arrSalesDiff);
      const zProd  = _zRobust(_safe(s.Product), arrProd);
      const zATV   = _zRobust(_safe(s.ATV), arrATV);
      const zWaste = -_zRobust(_safe(s.Waste), arrWaste);
      const zLab   = -_zRobust(_safe(s.Labour), arrLab);
      const zEps   = -_zRobust(_safe(s.EnergyPerSales), arrEps);
      s.EfficiencyIndex = (zSales*0.25) + (zProd*0.20) + (zWaste*0.20) + (zLab*0.20) + (zEps*0.10) + (zATV*0.05);
    });
  }

  bands.forEach(b => {
    computeEfficiencyIndex(b.stores);
    const sorted = [...b.stores].sort((x,y)=>_safe(y.EfficiencyIndex)-_safe(x.EfficiencyIndex));
    const n = Math.max(1, sorted.length);
    sorted.forEach((s, idx)=>{
      s.BandRank = idx+1;
      s.BandScore = (n===1)?100:Math.round((1-(idx/(n-1)))*100);
      s.BandRAG = _ragFromScore(s.BandScore);
    });
    b._avgBandScore = sorted.reduce((a,s)=>a+_safe(s.BandScore),0)/n;
  });

  // Recent within-band score (for risk comparison)
  function computeRecentScoreMap(bandStores){
    const recentList = bandStores.map(s=>recentById.get(String(s.Branch).trim().toLowerCase())).filter(Boolean);
    if(!recentList.length) return new Map();
    computeEfficiencyIndex(recentList);
    const sorted = [...recentList].sort((a,b)=>_safe(b.EfficiencyIndex)-_safe(a.EfficiencyIndex));
    const n = Math.max(1, sorted.length);
    const map = new Map();
    sorted.forEach((s, idx)=>{
      const score = (n===1)?100:Math.round((1-(idx/(n-1)))*100);
      map.set(String(s.Branch).trim().toLowerCase(), score);
    });
    return map;
  }

  bands.forEach(b => {
    const recentScoreMap = computeRecentScoreMap(b.stores);
    b.stores.forEach(s => {
      const rid = String(s.Branch).trim().toLowerCase();
      const r = recentById.get(rid);

      // Risk checks
      let turnoverDrop = false;
      if(r && _safe(s.AvgWeeklySales) > 0 && _safe(r.AvgWeeklySales) > 0){
        const ratio = _safe(r.AvgWeeklySales) / _safe(s.AvgWeeklySales);
        if(ratio < 0.85) turnoverDrop = true; // material drop vs YTD run-rate
      }

      let efficiencyDrop = false;
      if(recentScoreMap.has(rid)){
        const recentScore = recentScoreMap.get(rid);
        s.RecentBandScore = recentScore;
        if((_safe(recentScore) - _safe(s.BandScore)) <= -15) efficiencyDrop = true;
      } else {
        s.RecentBandScore = null;
      }

      let risk = null;
      if(turnoverDrop && efficiencyDrop) risk = {level:'high', label:'Turnover & control drop'};
      else if(turnoverDrop) risk = {level:'high', label:'Turnover drop vs YTD'};
      else if(efficiencyDrop) risk = {level:'med', label:'Control drop vs YTD'};
      s.Risk = risk;
    });
  });

  const bandSummary = bands.map((band) => {
    const vals = band.stores.map(s=>_safe(s.SalesTotal)).filter(v=>v>0);
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const avgScore = _safe(band._avgBandScore);
    const rag = _ragFromScore(avgScore);
    return `
      <div class="card p-4 border border-slate-200 flex flex-col gap-1">
        <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${band.name}</div>
        <div class="text-lg font-black text-slate-800">${_fmtMoney(min)} → ${_fmtMoney(max)}</div>
        <div class="text-xs font-bold ${rag.cls} w-fit px-2 py-1 rounded-md border">${rag.icon} Avg Band Score: ${avgScore.toFixed(0)} • ${band.stores.length} stores</div>
        <div class="text-[10px] text-slate-500 font-bold mt-1">Risk checks compare last 4 weeks (Wk ${recentFrom}–${recentTo}) vs YTD baseline</div>
      </div>`;
  }).join('');

  const headerNote = `This view is <b>YTD-first</b>. Band = store size (Total Sales £ for ${periodLabel}). Band Score ranks <b>investment performance</b> within that size band using Labour, Waste, Energy/£, Sales vs Target, Product and ATV. Drop Risk highlights stores slipping vs their own YTD expectations.`;

  const bandCards = bands.map((band, bi)=>{
    const vals = band.stores.map(s=>_safe(s.SalesTotal)).filter(v=>v>0);
    const min = Math.min(...vals);
    const max = Math.max(...vals);

    const rows = band.stores
      .sort((a,b)=>_safe(a.BandRank)-_safe(b.BandRank))
      .map((s)=>{
        const rag = s.BandRAG || _ragFromScore(s.BandScore);
        const recentScore = (s.RecentBandScore==null) ? '—' : (String(s.RecentBandScore) + '%');
        return `
          <tr class="border-b border-slate-100 text-[11px] hover:bg-slate-50">
            <td class="p-3 font-black">${s.BandRank ?? '—'}</td>
            <td class="p-3 font-bold">${s.Branch}</td>
            <td class="p-3 text-slate-500">${s.AM || '—'}</td>
            <td class="p-3 font-black text-indigo-700">${(s.BandScore ?? 0)}%</td>
            <td class="p-3"><span class="text-[10px] font-black ${rag.cls} px-2 py-1 rounded-md border">${rag.icon} ${rag.label}</span></td>
            <td class="p-3">${_riskBadge(s.Risk)}</td>
            <td class="p-3 font-black text-emerald-700">${_fmtMoney(s.SalesTotal)}</td>
            <td class="p-3 text-slate-600">${recentScore}</td>
            <td class="p-3">${_fmtPct(s.SalesDiff)}</td>
            <td class="p-3">${_fmtPct(s.Product)}</td>
            <td class="p-3">${_fmtPct(s.Waste)}</td>
            <td class="p-3">${_fmtPct(s.Labour)}</td>
            <td class="p-3">${(s.EnergyPerSales>0)?(s.EnergyPerSales.toFixed(5)):'—'}</td>
          </tr>`;
      }).join('');

    return `
      <div class="card overflow-hidden border-t-4 ${bi===0?'border-t-amber-400':'border-t-birds-green'}">
        <div class="p-5 flex flex-col md:flex-row md:items-end md:justify-between gap-2">
          <div>
            <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${band.name}</div>
            <div class="text-xl font-black text-slate-800">${_fmtMoney(min)} → ${_fmtMoney(max)}</div>
          </div>
          <div class="text-xs text-slate-500 font-bold">Band Score = efficiency within size band (YTD, 0–100)</div>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-slate-50 border-y border-slate-100">
              <tr>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Band Rank</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Store</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Area</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">YTD Band Score</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">RAG</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Drop Risk</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">YTD Sales (£)</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Recent Score</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Sales vs Target</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Product</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Waste</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Labour</th>
                <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Energy/£</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>

// ===== RANK TIMELINE SUPER ENGINE =====
async function buildRankTimeline(branchName) {
  const raw = await idbGetAll('kpi');
  const branchId = canonicalStoreId(branchName);

  const weeks = [...new Set(raw.map(k => k.Week))]
    .filter(Boolean)
    .sort((a,b)=>a-b);

  const timeline = [];

  for (const wk of weeks) {
    const weekData = aggregateData(
      raw.filter(k => k.Week === wk && !k.IsAnomaly)
    );

    if (!weekData.length) continue;

    const rankMap = computeRankMap(weekData, 'Sales', false);
    const rank = rankMap.get(branchId);

    if (rank) {
      timeline.push({ week: wk, rank: rank });
    }
  }

  return timeline;
}

async function drawRankMovementChart(storeName, canvasId) {
  const data = await buildRankTimeline(storeName);

  const labels = data.map(d => 'Wk ' + d.week);
  const ranks = data.map(d => d.rank);

  const avgRank = ranks.length ? ranks.reduce((a,b)=>a+b,0)/ranks.length : null;

  const ctx = document.getElementById(canvasId).getContext('2d');

  const datasets = [{
    label: 'Rank Position',
    data: ranks,
    borderColor: '#2563eb',
    backgroundColor: 'rgba(37, 99, 235, 0.1)',
    borderWidth: 4,
    fill: true,
    tension: 0.45,
    pointRadius: 6
  }];

  if(avgRank !== null){
    datasets.push({
      label: 'Company Avg Rank',
      data: Array(labels.length).fill(avgRank),
      borderColor: '#94a3b8',
      borderDash: [6,6],
      pointRadius: 0,
      borderWidth: 2,
      fill: false
    });
  }

  return new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: false,
      plugins: { legend: { display: true } },
      scales: {
        y: {
          reverse: true,
          ticks: { stepSize: 1 },
          title: { display: true, text: 'Rank' }
        },
        x: { title: { display: true, text: 'Week' } }
      }
    }
  });
}

<script>
// ===== AUDIT ACTION HUB PRO =====
// Advanced filters, drill-downs, SLA flags and structured PDF export.
let __auditHubCache = [];
let __auditHubCurrentRows = [];
let __auditHubSort = { key: 'risk', dir: 'desc' };

function escapeHtml(v){ return String(v ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])); }
function normalizeAuditCell(v){
  if(v === undefined || v === null) return '';
  let s = String(v).trim();
  try { if(s.startsWith('[')) { const parsed = JSON.parse(s.replace(/'/g, '"')); if(Array.isArray(parsed)) return parsed.join(', '); } } catch(e) {}
  return s.replace(/^\["?|"?\]$/g, '').replace(/"/g, '').replace(/Â/g, '').replace(/â€™/g, "'").replace(/â/g, '').trim();
}
function normalizeActionStatus(v){ const s = normalizeAuditCell(v).toLowerCase(); if(s.includes('closed')) return 'Closed'; if(s.includes('open')) return 'Open'; if(s === 'status') return 'Status'; return s ? s.charAt(0).toUpperCase() + s.slice(1) : 'Open'; }
function normalizeYesNo(v){ const s = normalizeAuditCell(v).toLowerCase(); return (s === 'yes' || s === 'y' || s === 'true' || s === 'critical') ? 'Yes' : 'No'; }
function actionStoreName(a){ return cleanStoreName(a.Store || a['Store Name'] || a.StoreName || (a.StoreEmail ? String(a.StoreEmail).split('@')[0] : '') || 'Unknown Store'); }
function actionAreaName(a){ const store = actionStoreName(a); const area = a.AreaManager || a.AM || safeGetAM(store) || 'Unassigned'; return area === 'Area Manager' ? safeGetAM(store) : area; }
function actionSectorName(a){ return normalizeAuditCell(a.Sector) || 'Uncategorised'; }
function actionCategoryName(a){ return normalizeAuditCell(a.Category) || 'Uncategorised'; }
function actionIsClosed(a){ return normalizeActionStatus(a.Status) === 'Closed'; }
function actionIsCritical(a){ return normalizeYesNo(a.Critical) === 'Yes'; }
function fmtDays(v){ const n = Number(v); return Number.isFinite(n) ? (Math.round(n * 10) / 10).toString() : '—'; }
function pct(part, total){ return total ? Math.round((part / total) * 1000) / 10 : 0; }
function countBy(arr, fn){ const m = new Map(); arr.forEach(x => { const k = fn(x) || 'Unknown'; m.set(k, (m.get(k)||0)+1); }); return Array.from(m.entries()).sort((a,b)=>b[1]-a[1] || String(a[0]).localeCompare(String(b[0]))); }
function buildStatusBreakdown(arr, keyFn){
  const m = new Map();
  arr.forEach(a => {
    const k = keyFn(a) || 'Unknown';
    if(!m.has(k)) m.set(k, {name:k, open:0, closed:0, critical:0, total:0});
    const o = m.get(k); o.total++;
    if(actionIsClosed(a)) o.closed++; else o.open++;
    if(actionIsCritical(a)) o.critical++;
  });
  return Array.from(m.values()).sort((a,b)=>b.open-a.open || b.total-a.total || a.name.localeCompare(b.name));
}
function auditDateValue(a){ return parseDateSafe(a.AuditDate || a.Date || a.auditDate); }
function closedDateValue(a){ return parseDateSafe(a.ClosedOn || a['Closed On']); }
function daysOpenNow(a){ if(actionIsClosed(a)) return Number(a.DaysToClose); const d = auditDateValue(a); return d ? Math.max(0, (new Date() - d) / 86400000) : Number(a.DaysOpen); }
function riskScore(a){ let score = 0; if(!actionIsClosed(a)) score += 20; if(actionIsCritical(a)) score += 30; const d = daysOpenNow(a); if(Number.isFinite(d)) score += Math.min(50, d); return score; }
function slaBucket(a){
  if(actionIsClosed(a)) return 'Closed';
  const d = daysOpenNow(a);
  if(actionIsCritical(a) && Number.isFinite(d) && d > 2) return 'Critical > 48h';
  if(Number.isFinite(d) && d > 30) return 'Open > 30 days';
  if(Number.isFinite(d) && d > 14) return 'Open > 14 days';
  if(Number.isFinite(d) && d > 7) return 'Open > 7 days';
  return 'In SLA / New';
}
function closureQuality(a){
  if(!actionIsClosed(a)) return 'Open';
  const h = normalizeAuditCell(a.HowClosed || '');
  const c = normalizeAuditCell(a.ExtraComment || '');
  if(!h && !c) return 'Closed - no comment';
  if((h + ' ' + c).length < 12) return 'Closed - short comment';
  return 'Closed - comment added';
}
function auditIssueTheme(a){
  const text = [a.Question, a.Description, a.ActionNeeded, a.Category, a.Sector].map(x => normalizeAuditCell(x).toLowerCase()).join(' ').replace(/\u00a0/g, ' ');
  if(/hair\s*net|hairnet|garnet|hair covering|hair coverings/.test(text)) return 'Hairnets / hair coverings not worn';
  if(/probe.*calibrat|calibrat.*probe|test caps/.test(text)) return 'Probe calibration overdue / missing';
  if(/scale.*calibrat|calibrat.*scale|shop scales|scales recorded/.test(text)) return 'Scale calibration / scales issue';
  if(/out of date|use by|use-by|date checking|stock rotated|stock rotation|unlabelled|unlabeled|labelled|labeled|labelling|labeling|day opened|date label/.test(text)) return 'Out of date / stock rotation / labelling';
  if(/multiplug|multi plug|extension lead|extension leads|adaptors|adapter/.test(text)) return 'Multiplugs / extension leads in use';
  if(/emergency lighting|emergency light|exit sign|fire exit signs|illuminated|zone map/.test(text)) return 'Emergency lighting / exit signage issues';
  if(/fire alarm|detection|call point|alarm system|fire safety checks|flick test/.test(text)) return 'Fire alarm / detection system issues';

function getHubDateRange(period){
  const today = new Date();
  const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  const startPrevMonth = new Date(today.getFullYear(), today.getMonth()-1, 1);
  const endPrevMonth = new Date(today.getFullYear(), today.getMonth(), 0, 23, 59, 59);
  const qStartMonth = Math.floor(today.getMonth()/3)*3;
  const startQuarter = new Date(today.getFullYear(), qStartMonth, 1);
  const startYear = new Date(today.getFullYear(), 0, 1);
  const minusDays = d => new Date(today.getFullYear(), today.getMonth(), today.getDate() - d);
  if(period === 'last7') return {from: minusDays(7), to: today};
  if(period === 'last30') return {from: minusDays(30), to: today};
  if(period === 'mtd') return {from: startOfMonth, to: today};
  if(period === 'prevmonth') return {from: startPrevMonth, to: endPrevMonth};
  if(period === 'qtd') return {from: startQuarter, to: today};
  if(period === 'ytd') return {from: startYear, to: today};
  if(period === 'custom') {
    const f = parseDateSafe(document.getElementById('auditFromDate')?.value); const t = parseDateSafe(document.getElementById('auditToDate')?.value);
    return {from:f, to:t};
  }
  return {from:null, to:null};
}
function applyAuditHubFilters(actions){

  const {from, to} = getHubDateRange(period);
  const q = (document.getElementById('auditSearch')?.value || '').toLowerCase().trim();
  return actions.filter(a => {
    if(area !== 'ALL' && a.AreaManager !== area) return false;
    if(sector !== 'ALL' && a.Sector !== sector) return false;
    if(category !== 'ALL' && a.Category !== category) return false;
    if(store !== 'ALL' && a.Store !== store) return false;
    if(status !== 'ALL' && a.Status !== status) return false;
    if(critical !== 'ALL' && a.Critical !== critical) return false;
    if(theme !== 'ALL' && a.IssueTheme !== theme) return false;
    if(sla !== 'ALL' && a.SLABucket !== sla) return false;

<script>


async function exportAuditCurrentViewPDF(){

  if(typeof html2canvas==='undefined' ||
     typeof window.jspdf==='undefined'){
      alert('PDF libraries still loading.');
      return;
  }

  const target =
      document.getElementById('audit-export-card');

  if(!target){
      alert('Audit Hub view not found');
      return;
  }

  window.scrollTo(0,0);

  await new Promise(resolve =>
      setTimeout(resolve,400)
  );

  const controls =
      target.querySelectorAll('button');

  const restore = [];

  controls.forEach(btn=>{
      restore.push([btn,btn.style.display]);

      if(!btn.innerText.includes('Current View')){
          btn.style.display='none';
      }
  });

  const expand =
      target.querySelectorAll(
          '.overflow-auto,.overflow-y-auto,[class*="max-h-"]'
      );

  const restoreExpand = [];

  expand.forEach(el=>{
      restoreExpand.push([
          el,
          el.style.overflow,
          el.style.maxHeight,
          el.style.height
      ]);

      el.style.overflow='visible';
      el.style.maxHeight='none';
      el.style.height='auto';
  });

  await new Promise(resolve =>
      requestAnimationFrame(resolve)
  );

  const canvas = await html2canvas(target,{
      scale:2,
      useCORS:true,
      backgroundColor:'#ffffff',
      logging:false
  });

  restore.forEach(([el,d])=>{
      el.style.display=d;
  });

  restoreExpand.forEach(([el,o,m,h])=>{
      el.style.overflow=o;
      el.style.maxHeight=m;
      el.style.height=h;
  });

  const { jsPDF } = window.jspdf;

  const pdf =
      new jsPDF('l','mm','a4');

  const pageW =
      pdf.internal.pageSize.getWidth();

  const pageH =
      pdf.internal.pageSize.getHeight();

  const imgW = pageW - 10;

  const sliceHeight =
      Math.floor(
          canvas.width *
          ((pageH-10)/imgW)
      );

  const pageCanvas =
      document.createElement('canvas');

  const ctx =
      pageCanvas.getContext('2d');

  pageCanvas.width =
      canvas.width;

  pageCanvas.height =
      sliceHeight;

  let sourceY = 0;
  let page = 0;

  while(sourceY < canvas.height){

      ctx.clearRect(
          0,0,
          pageCanvas.width,
          pageCanvas.height
      );

      ctx.drawImage(
          canvas,
          0,
          sourceY,
          canvas.width,
          sliceHeight,
          0,
          0,
          canvas.width,
          sliceHeight
      );

      if(page > 0){
          pdf.addPage();
      }

      pdf.addImage(
          pageCanvas.toDataURL('image/png'),
          'PNG',
          5,
          5,
          imgW,
          pageH - 10
      );

      sourceY += sliceHeight;
      page++;
  }

  pdf.save('Audit_Hub_Current_View.pdf');
}


// ===== SECTIONAL REVIEW PACK =====
// Company / Area Manager review pack that mirrors the existing app sections.
let __reviewPackData = null;

function rpEsc(v){ return String(v ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])); }
function rpNum(v){ const n=Number(v); return Number.isFinite(n)?n:0; }
function rpPct(v){ return (rpNum(v)*100).toFixed(1)+'%'; }
function rpMoney(v){ return '£'+rpNum(v).toFixed(0); }
function rpAvg(arr, fn){ const vals=arr.map(fn).map(Number).filter(Number.isFinite); return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0; }
function rpCountBy(arr, fn){ const m=new Map(); arr.forEach(x=>{const k=fn(x)||'Unknown'; m.set(k,(m.get(k)||0)+1);}); return Array.from(m.entries()).sort((a,b)=>b[1]-a[1] || String(a[0]).localeCompare(String(b[0]))); }
function rpStoreId(name){ return canonicalStoreId(name || ''); }
function rpAreaFromStore(store){ try { return safeGetAM(store) || 'Unassigned'; } catch(e){ return 'Unassigned'; } }
function rpAreaOfKpi(k){ return k.AM || rpAreaFromStore(k.Branch); }
function rpStoreNameAction(a){ return cleanStoreName(a.Store || a.StoreName || a['Store Name'] || (a.StoreEmail ? String(a.StoreEmail).split('@')[0] : '') || 'Unknown Store'); }
function rpAreaAction(a){ const am = a.AreaManager || a.AM || rpAreaFromStore(rpStoreNameAction(a)); return am === 'Area Manager' ? rpAreaFromStore(rpStoreNameAction(a)) : am; }
function rpStatus(a){ if(typeof normalizeActionStatus==='function') return normalizeActionStatus(a.Status); return String(a.Status||'').toLowerCase().includes('closed')?'Closed':'Open'; }
function rpClosed(a){ return rpStatus(a)==='Closed'; }
function rpCritical(a){ if(typeof normalizeYesNo==='function') return normalizeYesNo(a.Critical)==='Yes'; return ['yes','true','critical'].includes(String(a.Critical||'').toLowerCase()); }
function rpTheme(a){ if(typeof auditIssueTheme==='function') return auditIssueTheme(a); return String(a.Description || a.Question || a.ActionNeeded || 'Uncategorised'); }
function rpActionDays(a){ if(rpClosed(a)) return Number(a.DaysToClose); const d=parseDateSafe(a.AuditDate || a.Date); return d?Math.max(0,(new Date()-d)/86400000):Number(a.DaysOpen); }
function rpSla(a){ if(typeof slaBucket==='function') return slaBucket(a); if(rpClosed(a)) return 'Closed'; const d=rpActionDays(a); if(rpCritical(a)&&d>2) return 'Critical > 48h'; if(d>30) return 'Open > 30 days'; if(d>14) return 'Open > 14 days'; if(d>7) return 'Open > 7 days'; return 'In SLA / New'; }
function rpWeekRange(period, latestWeek){
  if(period==='latest') return {from:latestWeek,to:latestWeek,prevFrom:latestWeek-1,prevTo:latestWeek-1,label:`Week ${latestWeek}`};
  if(period==='last4') return {from:Math.max(1,latestWeek-3),to:latestWeek,prevFrom:Math.max(1,latestWeek-7),prevTo:latestWeek-4,label:`Weeks ${Math.max(1,latestWeek-3)}-${latestWeek}`};
  if(period==='last13') return {from:Math.max(1,latestWeek-12),to:latestWeek,prevFrom:Math.max(1,latestWeek-25),prevTo:latestWeek-13,label:`Weeks ${Math.max(1,latestWeek-12)}-${latestWeek}`};
  return {from:1,to:latestWeek,prevFrom:null,prevTo:null,label:`YTD Weeks 1-${latestWeek}`};
}
function rpFilterWeek(rows, range){ return rows.filter(r => (r.Week||0) >= range.from && (r.Week||0) <= range.to); }
function rpFilterPrev(rows, range){ if(range.prevFrom==null) return []; return rows.filter(r => (r.Week||0) >= range.prevFrom && (r.Week||0) <= range.prevTo); }
function rpScopeRows(scope, kpis, audits, actions){
  if(scope==='ALL') return {kpis,audits,actions};
  return {
    kpis:kpis.filter(k=>rpAreaOfKpi(k)===scope),
    audits:audits.filter(a=>rpAreaFromStore(a.Store)===scope),
    actions:actions.filter(a=>rpAreaAction(a)===scope)
  };
}
function rpAggStores(kpis, audits){
  const m=new Map();
  kpis.filter(k=>!k.IsAnomaly).forEach(k=>{
    const id=rpStoreId(k.Branch); if(!m.has(id)) m.set(id,{id,Branch:k.Branch,AM:rpAreaOfKpi(k),rows:[],auditRows:[]});
    m.get(id).rows.push(k);
  });
  audits.forEach(a=>{ const id=rpStoreId(a.Store); if(!m.has(id)) m.set(id,{id,Branch:a.Store,AM:rpAreaFromStore(a.Store),rows:[],auditRows:[]}); m.get(id).auditRows.push(a); });
  return Array.from(m.values()).map(s=>{
    const avg=(f)=>rpAvg(s.rows,r=>r[f]); const aud=(f)=>rpAvg(s.auditRows,r=>r[f]);
    const obj={Branch:s.Branch,AM:s.AM,Sales:avg('Sales'),Product:avg('Product'),Waste:avg('Waste'),Labour:avg('Labour'),ATV:avg('ATV'),Energy:avg('Energy'),SalesActual:rpAvg(s.rows,r=>r.SalesActual || r.__rawSales || 0),AuditScore:aud('Score'),Food:aud('Food'),Fire:aud('Fire'),HandS:aud('HandS'),Journey:aud('Journey'),Coffee:aud('Coffee'),Focus:aud('Focus')};
    obj.Score = typeof calculateStoreScore==='function' ? calculateStoreScore(obj) : (obj.Sales*100 + obj.Product*100 - obj.Waste*100 - obj.Labour*100);
    return obj;
  });
}
function rpKpi(label, value, sub='', colour='birds-green'){
  return `<div class="card p-5 border-t-4 ${colour==='red'?'border-t-red-500':colour==='amber'?'border-t-amber-400':'border-t-birds-green'}"><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${label}</div><div class="text-3xl font-black ${colour==='red'?'text-red-600':colour==='amber'?'text-amber-600':'birds-green'}">${value}</div><div class="text-xs font-bold text-slate-500 mt-1">${sub}</div></div>`;
}
function rpTrend(label, curr, prev, inverse=false, format='pct'){
  const diff = curr - prev; const good = inverse ? diff < 0 : diff > 0; const arrow = diff===0?'—':diff>0?'▲':'▼';
  const fmt = format==='money' ? '£'+Math.abs(diff).toFixed(2) : format==='whole' ? Math.abs(diff).toFixed(0) : (Math.abs(diff)*100).toFixed(1)+'%';
  return `<div class="card p-4"><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${label}</div><div class="text-2xl font-black text-slate-800">${format==='money'?rpMoney(curr):format==='whole'?Math.round(curr):rpPct(curr)}</div><div class="text-xs font-black ${diff===0?'text-slate-400':good?'text-emerald-600':'text-red-600'}">${arrow} ${diff===0?'No change':fmt} vs previous</div></div>`;
}
function rpBreakdown(title, pairs){ return `<div class="card p-5"><h3 class="font-black outfit text-sm uppercase tracking-widest text-slate-400 mb-4">${title}</h3>${pairs.length?pairs.map(([n,c])=>`<div class="flex justify-between gap-3 py-2 border-b border-slate-100 last:border-0"><span class="text-xs font-bold text-slate-700">${rpEsc(n)}</span><span class="font-black birds-green">${c}</span></div>`).join(''):'<p class="text-slate-400 italic">No data.</p>'}</div>`; }
function rpOpenClosed(title, rows){ return `<div class="card p-5"><h3 class="font-black outfit text-sm uppercase tracking-widest text-slate-400 mb-4">${title}</h3>${rows.length?rows.map(x=>`<div class="mb-3"><div class="flex justify-between text-xs font-black"><span>${rpEsc(x.name)}</span><span>${x.open} open / ${x.closed} closed</span></div><div class="progress-bar"><div class="progress-fill-warn" style="width:${x.total?x.open/x.total*100:0}%"></div></div></div>`).join(''):'<p class="text-slate-400 italic">No data.</p>'}</div>`; }
function rpOpenClosedRows(actions, fn){ const m=new Map(); actions.forEach(a=>{const k=fn(a)||'Unknown'; if(!m.has(k))m.set(k,{name:k,open:0,closed:0,total:0}); const o=m.get(k); o.total++; if(rpClosed(a))o.closed++; else o.open++;}); return Array.from(m.values()).sort((a,b)=>b.open-a.open||b.total-a.total).slice(0,12); }
function rpBandStores(allStores, scopeStores){
  const sorted=allStores.filter(s=>s.SalesActual>0).sort((a,b)=>b.SalesActual-a.SalesActual); const n=sorted.length||1; const bandMap=new Map();
  sorted.forEach((s,i)=>{ const p=(i+1)/n; const band=p<=0.25?'A - High Sales':p<=0.5?'B - Upper Mid':p<=0.75?'C - Lower Mid':'D - Developing'; bandMap.set(rpStoreId(s.Branch),band); });
  return scopeStores.map(s=>({...s,Band:bandMap.get(rpStoreId(s.Branch)) || 'No sales actual'})).sort((a,b)=>b.SalesActual-a.SalesActual);
}
async function rpBuild(scope, period){
  const kAll=await idbGetAll('kpi'), aAll=await idbGetAll('audits'), actAll=await idbGetAll('actions'), sw=await idbGetAll('store_winners_log'), aw=await idbGetAll('area_winners_log');
  const latestWeek=Math.max(1,...[...kAll.map(k=>k.Week),...aAll.map(a=>a.Week),...actAll.map(a=>a.Week)].filter(Boolean)); const range=rpWeekRange(period, latestWeek);
  const curBase={kpis:rpFilterWeek(kAll,range), audits:rpFilterWeek(aAll,range), actions:rpFilterWeek(actAll,range)}; const prevBase={kpis:rpFilterPrev(kAll,range), audits:rpFilterPrev(aAll,range), actions:rpFilterPrev(actAll,range)};
  const cur=rpScopeRows(scope,curBase.kpis,curBase.audits,curBase.actions); const prev=rpScopeRows(scope,prevBase.kpis,prevBase.audits,prevBase.actions);
  const allStores=rpAggStores(curBase.kpis,curBase.audits); const stores=rpAggStores(cur.kpis,cur.audits);
  const winners=sw.filter(w=>(w.Week||0)>=range.from && (w.Week||0)<=range.to).filter(w=>scope==='ALL'||rpAreaFromStore(w.Branch)===scope);
  const areaWins=aw.filter(w=>(w.Week||0)>=range.from && (w.Week||0)<=range.to).filter(w=>scope==='ALL'||w.Winner===scope);

}

async function refreshReviewPack(){

  const bandRows=banded.map(s=>`<tr class="border-b border-slate-100"><td class="p-2 font-black">${rpEsc(s.Branch)}</td><td class="p-2">${rpMoney(s.SalesActual)}</td><td class="p-2 font-bold">${rpEsc(s.Band)}</td><td class="p-2">#${rankMap.get(rpStoreId(s.Branch))||'-'}</td></tr>`).join('');
  document.getElementById('reviewPackBody').innerHTML=`<section class="space-y-4"><h3 class="text-xl font-black outfit birds-green uppercase">1. KPI trends vs previous period</h3><div class="grid grid-cols-1 md:grid-cols-6 gap-4">${rpTrend('Sales',avg(cur.kpis,'Sales'),pavg('Sales'))}${rpTrend('Product',avg(cur.kpis,'Product'),pavg('Product'))}${rpTrend('Waste',avg(cur.kpis,'Waste'),pavg('Waste'),true)}${rpTrend('Labour',avg(cur.kpis,'Labour'),pavg('Labour'),true)}${rpTrend('ATV',avg(cur.kpis,'ATV'),pavg('ATV'),'false','money')}${rpTrend('Energy',avg(cur.kpis,'Energy'),pavg('Energy'),true,'whole')}</div></section>
  <section class="space-y-4"><h3 class="text-xl font-black outfit birds-green uppercase">2. Weekly report / store KPI view</h3><div class="card overflow-auto"><table class="w-full text-left text-sm"><thead class="bg-slate-50"><tr><th class="p-2">Store</th><th class="p-2">Network</th><th class="p-2">Sales</th><th class="p-2">Product</th><th class="p-2">Waste</th><th class="p-2">Labour</th><th class="p-2">Audit</th></tr></thead><tbody>${weeklyRows||'<tr><td class="p-4" colspan="7">No KPI rows for this selection.</td></tr>'}</tbody></table></div></section>
  <section class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-1">${rpBreakdown('3. Podium / store awards accrued', medalRows)}</div><div class="card p-5"><h3 class="font-black outfit text-sm uppercase tracking-widest text-slate-400 mb-4">Area podium wins</h3><p class="font-black text-slate-800">${rpEsc(areaWinMsg)}</p>${d.areaWins.slice(0,8).map(w=>`<div class="text-xs font-bold text-slate-600 mt-2">Week ${w.Week}: ${rpEsc(w.Winner)} (${w.Score||''})</div>`).join('')}</div><div>${rpOpenClosed('Audit actions by store', rpOpenClosedRows(cur.actions,rpStoreNameAction))}</div></section>
  <section class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="card p-5"><h3 class="font-black outfit text-sm uppercase tracking-widest text-slate-400 mb-4">4. Network standing</h3>${allRank.filter(s=>scope==='ALL'||s.AM===scope).slice(0,20).map(s=>`<div class="flex justify-between border-b border-slate-100 py-2 text-xs"><span class="font-black">#${s.NetworkRank} ${rpEsc(s.Branch)}</span><span>${rpPct(s.Sales)} sales • ${rpPct(s.Product)} product</span></div>`).join('')||'<p>No standings for selection.</p>'}</div><div class="card p-5"><h3 class="font-black outfit text-sm uppercase tracking-widest text-slate-400 mb-4">5. Audit breakdown</h3><div class="grid grid-cols-3 gap-3 mb-4"><div><div class="text-xs font-black text-slate-400">Open</div><div class="text-2xl font-black text-amber-600">${open}</div></div><div><div class="text-xs font-black text-slate-400">Closed</div><div class="text-2xl font-black birds-green">${closed}</div></div><div><div class="text-xs font-black text-slate-400">Critical</div><div class="text-2xl font-black text-red-600">${critical}</div></div></div>${rpCountBy(cur.actions,rpTheme).slice(0,8).map(([n,c])=>`<div class="flex justify-between py-2 border-b border-slate-100 text-xs"><span class="font-bold">${rpEsc(n)}</span><span class="font-black birds-green">${c}</span></div>`).join('')}</div></section>
  <section class="space-y-4"><h3 class="text-xl font-black outfit birds-green uppercase">6. Financial banding results</h3><div class="card overflow-auto"><table class="w-full text-left text-sm"><thead class="bg-slate-50"><tr><th class="p-2">Store</th><th class="p-2">Avg actual sales</th><th class="p-2">Financial band</th><th class="p-2">Network rank</th></tr></thead><tbody>${bandRows||'<tr><td class="p-4" colspan="4">No actual sales data for this selection.</td></tr>'}</tbody></table></div></section>`;
}
async function exportReviewPackExcel(){
  const d=window.__reviewPackData || await rpBuild(document.getElementById('reviewScope')?.value||'ALL',document.getElementById('reviewPeriod')?.value||'latest'); const wb=XLSX.utils.book_new();
  const stores=rpAggStores(d.cur.kpis,d.cur.audits); const allRank=d.allStores.slice().sort((a,b)=>b.Score-a.Score).map((s,i)=>({...s,NetworkRank:i+1})); const rmap=new Map(allRank.map(s=>[rpStoreId(s.Branch),s.NetworkRank])); const banded=rpBandStores(d.allStores,stores);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([{Scope:d.scope,Period:d.range.label,KPIRows:d.cur.kpis.length,AuditRows:d.cur.audits.length,ActionRows:d.cur.actions.length,OpenActions:d.cur.actions.filter(a=>!rpClosed(a)).length,Critical:d.cur.actions.filter(rpCritical).length}]),'Summary');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(stores.map(s=>({Store:s.Branch,Area:s.AM,NetworkRank:rmap.get(rpStoreId(s.Branch)),Sales:rpPct(s.Sales),Product:rpPct(s.Product),Waste:rpPct(s.Waste),Labour:rpPct(s.Labour),Audit:s.AuditScore?s.AuditScore.toFixed(1)+'%':''}))), 'Weekly KPI');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(d.winners.map(w=>({Week:w.Week,Store:w.Branch,Metric:w.Metric}))), 'Awards');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(d.cur.actions.map(a=>({Area:rpAreaAction(a),Store:rpStoreNameAction(a),Theme:rpTheme(a),Status:rpStatus(a),Critical:rpCritical(a)?'Yes':'No',SLA:rpSla(a),Description:a.Description,Action:a.ActionNeeded,HowClosed:a.HowClosed,ExtraComment:a.ExtraComment}))), 'Audit Actions');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(banded.map(s=>({Store:s.Branch,AvgActualSales:s.SalesActual,Band:s.Band,NetworkRank:rmap.get(rpStoreId(s.Branch))}))), 'Financial Banding');
  XLSX.writeFile(wb,`Birds_Sectional_Review_${d.scope}_${d.period}_${new Date().toISOString().slice(0,10)}.xlsx`.replace(/[^a-z0-9_.-]+/gi,'_'));
}
async function exportReviewPackPDF(){
  const card=document.getElementById('review-pack'); if(!card){alert('Open Review Pack first.');return;} if(typeof html2canvas==='undefined'||typeof window.jspdf==='undefined'){alert('PDF libraries still loading.');return;}
  const controls=card.querySelectorAll('.review-controls,button'); const restore=[]; controls.forEach(el=>{restore.push([el,el.style.display]); el.style.display='none';});
  const expand=card.querySelectorAll('.overflow-auto,.overflow-y-auto,[class*="max-h-"]'); const rs=[]; expand.forEach(el=>{rs.push([el,el.style.overflow,el.style.maxHeight,el.style.height]); el.style.overflow='visible'; el.style.maxHeight='none'; el.style.height='auto';});
  await new Promise(r=>requestAnimationFrame(()=>r())); const canvas=await html2canvas(card,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false,
windowWidth:Math.max(card.scrollWidth,1500)});
  restore.forEach(([el,d])=>el.style.display=d); rs.forEach(([el,o,m,h])=>{el.style.overflow=o;el.style.maxHeight=m;el.style.height=h;});
  const {jsPDF}=window.jspdf; const pdf=new jsPDF('l','mm','a4'); const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight(); const imgW=pw-12, sliceH=Math.floor(canvas.width*(ph-12)/imgW); const pageCanvas=document.createElement('canvas'); const ctx=pageCanvas.getContext('2d'); pageCanvas.width=canvas.width; pageCanvas.height=sliceH; let y=0,p=0; while(y<canvas.height){ctx.clearRect(0,0,pageCanvas.width,pageCanvas.height);ctx.drawImage(canvas,0,y,canvas.width,sliceH,0,0,canvas.width,sliceH); if(p>0)pdf.addPage(); pdf.addImage(pageCanvas.toDataURL('image/png'),'PNG',6,6,imgW,ph-12); y+=sliceH;p++;}
  pdf.save(`Birds_Sectional_Review_${new Date().toISOString().slice(0,10)}.pdf`);
}
