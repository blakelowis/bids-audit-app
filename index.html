  <script>
    async function exportVisibleViewAsZip(){
      const cards = document.querySelectorAll('#mainView .card, .area-card-export');
      if(!cards.length){ alert('Nothing to export on this view'); return; }

      const zip = new JSZip();
      let idx = 1;

      for(const card of cards){
        const btn = card.querySelector('.export-btn');
        if(btn) btn.style.display = 'none';

        // Force landscape mode for the duration of the export
        card.classList.add('export-force-landscape');

        const canvas = await html2canvas(card, {
          scale: 2,
          backgroundColor: '#ffffff',
          useCORS: true,
          logging: false,
          width: 1400 // Standard horizontal screen width for clean PNGs
        });

        const img = canvas.toDataURL('image/png').split(',')[1];
        zip.file(`Card_${idx}.png`, img, { base64: true });
        idx++;

        if(btn) btn.style.display = 'flex';
        card.classList.remove('export-force-landscape');
      }

      const blob = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `Birds_${currentView}_${currentTimeFilter}.zip`;
      a.click();
    }
  </script>

const DEFAULT_AREA_MAPPING = {
  'Katie Cartwright': ['Bingham','Bulwell','Chilwell','Clifton','Melton Road','Newark','Radcliffe','Ruddington','Southwell','Sherwood','Sutton','Sutton Lakeside','Victoria Centre'],
  'Craig White': ['Alfreton','Arnold','Beeston','Ilkeston','Lister Gate','Listergate','Long Eaton','Mansfield','Mapperley','Teal Park','West Bridgford','Wollaton'],
  'Paul Reeves': ['Allenton','Alvaston','Belper','Duffield','Eastwood','Heanor','Hucknall','Mackworth','Matlock','Ripley','Sinfin','Spondon'],
  'Suzanne Green': ['Albert Street','Ashbourne','Bakery Shop','Borrowash','Chaddesden','Chellaston','Derbion Crown Walk','Littleover','Melbourne','Mickleover','Oakwood','Park Farm'],
  'Thomas Henson': ['Anstey','Ashby','Branston','Burton','Burton Expresso','Coalville','East Leake','Keyworth','Lichfield','Loughborough','Stretton','Swadlincote','Uttoxeter']
};
const AM_LIST = ['Katie Cartwright', 'Craig White', 'Paul Reeves', 'Suzanne Green', 'Thomas Henson', 'Unassigned'];

let db, currentView = 'overview', latestWkGlobal = 0;
let directoryHandle = null; 
let storeMap = new Map();
let originalStoreNames = new Map();
let currentTimeFilter = 'latest';
let trendChartInstance = null;

const req = indexedDB.open('BirdsExecutiveHub_v14', 1);
req.onupgradeneeded = e => {
  const d = e.target.result;
  if(!d.objectStoreNames.contains('kpi')) d.createObjectStore('kpi', { keyPath: ['Branch','Week'] });
  if(!d.objectStoreNames.contains('audits')) d.createObjectStore('audits', { keyPath: ['Store', 'Week'] });
  if(!d.objectStoreNames.contains('stores')) d.createObjectStore('stores', { keyPath: 'BranchId' });
  if(!d.objectStoreNames.contains('actions')) d.createObjectStore('actions', { keyPath: 'ActionID', autoIncrement: true });
  if(!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'id' });
};
req.onsuccess = async e => { 
    db = e.target.result; 
    await loadStoreMap();
    await loadDirectoryHandle();
    renderDashboard(); 
};

// Safe DB Wrappers to prevent hangs
const idbGetAll = (s) => new Promise(res => { const r = db.transaction(s).objectStore(s).getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => res([]); });
const idbPut = (s, v) => new Promise(res => { const r = db.transaction(s,'readwrite').objectStore(s).put(v); r.onsuccess = () => res(true); r.onerror = (err) => { console.error('DB Put Error', err); res(false); }; });
const idbClear = (s) => new Promise(res => { const r = db.transaction(s,'readwrite').objectStore(s).clear(); r.onsuccess = () => res(true); r.onerror = () => res(false); });

async function loadStoreMap() {
    const stores = await idbGetAll('stores');
    if (stores.length === 0) {
        for (const [am, branches] of Object.entries(DEFAULT_AREA_MAPPING)) {
            for (const b of branches) {
                let lowerId = b.trim().toLowerCase();
                await idbPut('stores', { BranchId: lowerId, originalName: b, AM: am });
                storeMap.set(lowerId, am);
                originalStoreNames.set(lowerId, b);
            }
        }
    } else {
        stores.forEach(s => {
            storeMap.set(s.BranchId, s.AM);
            originalStoreNames.set(s.BranchId, s.originalName);
        });
    }
}

async function updateStoreAM(branchId, newAM) {
    const origName = originalStoreNames.get(branchId);
    await idbPut('stores', { BranchId: branchId, originalName: origName, AM: newAM });
    storeMap.set(branchId, newAM);
    if(currentView === 'control') renderDashboard();
}

async function addNewStore() {
    const nameInput = document.getElementById('newStoreName').value.trim();
    const amSelect = document.getElementById('newStoreAM').value;
    if(!nameInput) return alert("Please enter a store name.");
    
    const lowerId = nameInput.toLowerCase();
    await idbPut('stores', { BranchId: lowerId, originalName: nameInput, AM: amSelect });
    storeMap.set(lowerId, amSelect);
    originalStoreNames.set(lowerId, nameInput);
    
    document.getElementById('newStoreName').value = '';
    renderDashboard();
    alert(`Store '${nameInput}' added successfully to ${amSelect}.`);
}

function parseVal(v){
  if(v === undefined || v === null || v === '') return 0;
  let s = String(v).trim();
  const m = s.match(/-?\d+(?:\.\d+)?/);
  if(!m) return 0;
  let num = parseFloat(m[0]);
  return s.includes('%') ? num/100 : num;
}

function _finiteOr0(x){ x = Number(x); return Number.isFinite(x) ? x : 0; }
function _clamp(x, lo, hi){ x = _finiteOr0(x); return Math.max(lo, Math.min(hi, x)); }

function _fixRatio(v, {allowNegative=false} = {}){
  v = _finiteOr0(v);
  if (!Number.isFinite(v)) return 0;
  if (Math.abs(v) > 1.5 && Math.abs(v) <= 200) v = v / 100;
  if (Math.abs(v) > 1.5 && Math.abs(v) <= 20000) v = v / 10000;
  if (Math.abs(v) > 1.5) v = 0;
  return _clamp(v, allowNegative ? -1 : 0, 1);
}

function _fixATV(v){
  v = _finiteOr0(v);
  if (v < 0) v = 0;
  if (v > 100 && v <= 10000) v = v / 100;
  return _clamp(v, 0, 200);
}

function _fixEnergy(v){
  v = _finiteOr0(v);
  if (v < 0) v = Math.abs(v);
  if (v > 0 && v < 1) v = 0;
  return _clamp(v, 0, 50000);
}

function _fixScore100(v){
  v = _finiteOr0(v);
  if (v > 0 && v <= 1.5) v = v * 100;
  return _clamp(v, 0, 100);
}

async function validateAndCorrectData(weeksTouched){
  try {
    const kpis = await idbGetAll('kpi');
    for (const rec of kpis) {
      if (Array.isArray(weeksTouched) && weeksTouched.length && !weeksTouched.includes(rec.Week)) continue;
      const fixed = { ...rec };
      if (fixed.__rawSales === undefined) fixed.__rawSales = rec.Sales;
      if (fixed.__rawProduct === undefined) fixed.__rawProduct = rec.Product;
      if (fixed.__rawWaste === undefined) fixed.__rawWaste = rec.Waste;
      if (fixed.__rawLabour === undefined) fixed.__rawLabour = rec.Labour;
      if (fixed.__rawATV === undefined) fixed.__rawATV = rec.ATV;
      if (fixed.__rawEnergy === undefined) fixed.__rawEnergy = rec.Energy;

      fixed.Sales = _fixRatio(rec.Sales, {allowNegative:true});
      fixed.Product = _fixRatio(rec.Product, {allowNegative:true});
      fixed.Waste = _fixRatio(rec.Waste, {allowNegative:false});
      fixed.Labour = _fixRatio(rec.Labour, {allowNegative:false});
      fixed.ATV = _fixATV(rec.ATV);
      fixed.Energy = _fixEnergy(rec.Energy);

      await idbPut('kpi', fixed);
    }

    const audits = await idbGetAll('audits');
    for (const rec of audits) {
      if (Array.isArray(weeksTouched) && weeksTouched.length && !weeksTouched.includes(rec.Week)) continue;
      const fixed = { ...rec };
      if (fixed.__rawScore === undefined) fixed.__rawScore = rec.Score;
      if (fixed.__rawFood === undefined) fixed.__rawFood = rec.Food;
      if (fixed.__rawFire === undefined) fixed.__rawFire = rec.Fire;
      if (fixed.__rawHandS === undefined) fixed.__rawHandS = rec.HandS;
      if (fixed.__rawJourney === undefined) fixed.__rawJourney = rec.Journey;
      if (fixed.__rawCoffee === undefined) fixed.__rawCoffee = rec.Coffee;
      if (fixed.__rawFocus === undefined) fixed.__rawFocus = rec.Focus;

      fixed.Score = _fixScore100(rec.Score);
      fixed.Food = _fixScore100(rec.Food);
      fixed.Fire = _fixScore100(rec.Fire);
      fixed.HandS = _fixScore100(rec.HandS);
      fixed.Journey = _fixScore100(rec.Journey);
      fixed.Coffee = _fixScore100(rec.Coffee);
      fixed.Focus = _fixScore100(rec.Focus);

      await idbPut('audits', fixed);
    }
  } catch (e) {
    console.warn('Post-ingest validation failed:', e);
  }
}

function findCols(rows){
  for(let r=0; r<Math.min(rows.length, 30); r++){
    if(!rows[r]) continue;
    let maxCols = Math.max(rows[r].length || 0, (rows[r+1] ? rows[r+1].length : 0) || 0);
    let headers = [];
    
    for(let c=0; c<maxCols; c++) {
      let h1 = String(rows[r][c] || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
      let h2 = (rows[r+1] && rows[r+1][c]) ? String(rows[r+1][c] || '').toLowerCase().replace(/[^a-z0-9]+/g, '') : '';
      headers.push(h1 + h2);
    }
    
    const idxB = headers.findIndex(x => x === 'branch' || x === 'store' || x === 'shop' || x.includes('branchname'));
    
    if(idxB >= 0) {
      let hasSubHeader = rows[r+1] && rows[r+1].some(x => String(x).toLowerCase().includes('actual') || String(x).toLowerCase().includes('target'));
      const baseProduct = headers.findIndex(x => x.includes('producttarget'));
      const idxProduct = baseProduct >= 0 ? baseProduct + 2 : -1;

      return {
        hr: hasSubHeader ? r + 1 : r, 
        idxB: idxB, 
        idxS: headers.findIndex(x => x.includes('actualsales') || x == 'sales' || x.includes('sales')),
        idxP: idxProduct,
        idxW: headers.findIndex(x => x.includes('waste') || x.includes('wastage')), 
        idxL: headers.findIndex(x => x.includes('wages') || x.includes('labour')),
        idxA: headers.findIndex(x => x.includes('atv') && !x.includes('target')), 
        idxE: headers.findIndex(x => x.includes('energy') || x.includes('green') || x.includes('kwh'))
      };
    }
  }
  return null;
}

function parseDateSafe(val) {
    if(!val || String(val).includes('#')) return null;
    if(!isNaN(val) && Number(val) > 20000 && Number(val) < 100000) {
        return new Date(Math.round((Number(val) - 25569)*86400*1000));
    }
    let s = String(val).trim();
    let d = new Date(s);
    if(isNaN(d.getTime())) {
        const ukDateMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
        if(ukDateMatch) {
            let day = parseInt(ukDateMatch[1], 10);
            let month = parseInt(ukDateMatch[2], 10) - 1;
            let year = parseInt(ukDateMatch[3], 10);
            if(year < 100) year += 2000;
            return new Date(year, month, day);
        }
        return null;
    }
    return d;
}

async function loadDirectoryHandle() {
    try {
        const settings = await idbGetAll('settings');
        const savedHandle = settings.find(s => s.id === 'masterFolder');
        if (savedHandle && savedHandle.dirHandle) {
            directoryHandle = savedHandle.dirHandle;
            document.getElementById('folderStatus').innerText = `Status: Anchored to Persistent Folder`;
        }
    } catch(e) {
        console.warn('Could not load persistent folder', e);
    }
}

async function selectAndAnchorFolder() {
    try {
        if (!('showDirectoryPicker' in window)) {
            alert('Your browser does not support persistent folder selection. Please use Chrome or Edge.');
            return;
        }
        directoryHandle = await window.showDirectoryPicker();
        await idbPut('settings', { id: 'masterFolder', dirHandle: directoryHandle });
        document.getElementById('folderStatus').innerText = `Status: Anchored to Persistent Folder`;
        await syncData();
    } catch (err) {
        console.error("Folder selection cancelled or failed", err);
    }
}

async function verifyPermission(fileHandle, readWrite) {
    const options = {};
    if (readWrite) { options.mode = 'readwrite'; }
    if ((await fileHandle.queryPermission(options)) === 'granted') { return true; }
    if ((await fileHandle.requestPermission(options)) === 'granted') { return true; }
    return false;
}

async function syncData() {
  if (!directoryHandle) {
      alert("Please anchor a master folder first using 'Select Master Folder'.");
      return;
  }
  
  const hasPerm = await verifyPermission(directoryHandle, false);
  if(!hasPerm) {
      alert("Permission to read the folder was denied.");
      return;
  }

  document.getElementById('ingestStatus').innerText = "Scanning Folder... Please wait.";
  
  let cachedFiles = [];
  try {
      for await (const entry of directoryHandle.values()) {
          if (entry.kind === 'file' && entry.name.endsWith('.xlsx') && !entry.name.startsWith('~')) {
              cachedFiles.push(await entry.getFile());
          }
      }
  } catch (err) {
      console.error("Error reading directory", err);
      alert("Could not scan directory. Ensure the folder still exists.");
      return;
  }

  if (cachedFiles.length === 0) {
      document.getElementById('ingestStatus').innerText = "No .xlsx files found in the selected folder.";
      return;
  }

  const weeksTouched = new Set();
  await idbClear('actions'); 

  // Robust Processing Loop with UI yield
  let filesProcessed = 0;
  for (const file of cachedFiles) {
    filesProcessed++;
    document.getElementById('ingestStatus').innerText = `Processing file ${filesProcessed} of ${cachedFiles.length}...`;
    
    // Crucial: Yield to the main thread so the UI can update!
    await new Promise(r => setTimeout(r, 20));

    try {
      if(typeof XLSX === 'undefined') {
          throw new Error("XLSX library failed to load from CDN. Check your connection or clear the Service Worker cache.");
      }

      const buffer = await file.arrayBuffer();
      const wb = XLSX.read(buffer, { type: 'array' });
      
      const wkMatch = file.name.match(/Wk(\d+)/i);
      const fileWk = wkMatch ? parseInt(wkMatch[1]) : 0;
      if(fileWk) weeksTouched.add(fileWk);
      if(fileWk > latestWkGlobal) latestWkGlobal = fileWk;

      if(file.name.toLowerCase().includes('weekly')) {
        const rows = XLSX.utils.sheet_to_json(wb.Sheets['Report 1 (Detailed)'], {header:1});
        const cols = findCols(rows);
        
        if(cols) {
          for(let i=cols.hr+1; i<rows.length; i++){
            const r = rows[i]; 
            if(!r || !r[cols.idxB] || String(r[cols.idxB]).toLowerCase().includes('total')) continue;
            
            let branchId = String(r[cols.idxB]).trim().toLowerCase();
            await idbPut('kpi', {
              Branch: String(r[cols.idxB]).trim(), Week: fileWk, AM: storeMap.get(branchId) || 'Unassigned',
              Sales: cols.idxS >= 0 ? parseVal(r[cols.idxS]) : 0, 
              Product: cols.idxP >= 0 ? parseVal(r[cols.idxP]) : 0,
              Waste: cols.idxW >= 0 ? parseVal(r[cols.idxW]) : 0, 
              Labour: cols.idxL >= 0 ? parseVal(r[cols.idxL]) : 0, 
              ATV: cols.idxA >= 0 ? parseVal(r[cols.idxA]) : 0, 
              Energy: cols.idxE >= 0 ? parseVal(r[cols.idxE]) : 0
            });
          }
        }
      }
      if(file.name.toLowerCase().includes('scorecard')) {
        const sWk = fileWk > 0 ? fileWk : (latestWkGlobal > 0 ? latestWkGlobal : 1);
        if(sWk) weeksTouched.add(sWk);
        
        if(wb.Sheets['Scorecards']) {
            const json = XLSX.utils.sheet_to_json(wb.Sheets['Scorecards']);
            for(const r of json) {
              if(r.Store) {
                await idbPut('audits', {
                  Store: String(r.Store).trim(), Week: sWk,
                  Score: parseVal(r['Total score'] || r['Audit Score']) * (String(r['Total score']||'').includes('%')?100:1),
                  Food: parseVal(r['Food safety']), Fire: parseVal(r['Fire safety']), HandS: parseVal(r['HandS ']), 
                  Journey: parseVal(r['Customer journey']), Coffee: parseVal(r['Coffee']), Focus: parseVal(r['Birds focus'])
                });
              }
            }
        }

        if(wb.Sheets['Data']) {
            const dataJson = XLSX.utils.sheet_to_json(wb.Sheets['Data']);
            for(const r of dataJson) {
                if(r.Question && r.Status) {
                    let dOpen = parseDateSafe(r.Date);
                    let dClosed = parseDateSafe(r['Closed On']);
                    let daysToClose = null;
                    
                    if(dOpen && dClosed) {
                        daysToClose = (dClosed - dOpen) / (1000 * 60 * 60 * 24);
                        if(daysToClose < 0) daysToClose = 0; 
                    }

                    await idbPut('actions', {
                        Week: sWk, StoreEmail: r['Store Email'], Category: r.Category,
                        Question: r.Question, Status: String(r.Status).toLowerCase(),
                        DaysToClose: daysToClose
                    });
                }
            }
        }
      }
    } catch (innerErr) {
       console.warn(`Skipping file ${file.name} due to an error:`, innerErr);
    }
  }

  document.getElementById('ingestStatus').innerText = "Last Updated: " + new Date().toLocaleTimeString();
  await validateAndCorrectData(Array.from(weeksTouched));
  renderDashboard();
}

function getTrendStr(currVal, prevVal, isInverse=false, format='percent') {
 if(prevVal === undefined || isNaN(prevVal) || currVal === prevVal) {
  return `<div class="trend-wrap"><span class="trend-flat">—</span><div class="spark spark-flat"></div></div>`;
 }
 const diff = currVal - prevVal;
 const absDiff = Math.abs(diff);

 let fmt = '';
 if(format === 'percent') fmt = `${(absDiff*100).toFixed(1)}%`;
 else if(format === 'currency') fmt = `£${absDiff.toFixed(2)}`;
 else if(format === 'whole') fmt = absDiff.toFixed(0);
 else if(format === 'decimal') fmt = absDiff.toFixed(1);

 const good = isInverse ? diff < 0 : diff > 0;
 const arrow = diff > 0 ? '▲' : '▼';

 return good
   ? `<div class="trend-wrap"><span class="trend-up">${arrow} ${fmt}</span><div class="spark spark-up"></div></div>`
   : `<div class="trend-wrap"><span class="trend-down">${arrow} ${fmt}</span><div class="spark spark-down"></div></div>`;
}

function ringSVG(pct, stroke='#00A88E'){
 const p = Math.max(0, Math.min(100, Number(pct) || 0));
 const dash = p.toFixed(1);
 return `

   <svg viewBox="0 0 36 36" class="w-full h-full">

    <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831" fill="none" stroke="${stroke}" stroke-linecap="round" stroke-width="3" stroke-dasharray="${dash}, 100"/>

}

    // Force horizontal format for export capture

function aggregateData(dataArray) {
    const map = new Map();
    dataArray.forEach(d => {
        const branchId = d.Branch.trim().toLowerCase();
        const am = storeMap.get(branchId) || 'Unassigned';
        if(am === 'Unassigned') return;
        
        if(!map.has(d.Branch)) map.set(d.Branch, { Branch: d.Branch, AM: am, count:0, Sales:0, Product:0, Waste:0, Labour:0, ATV:0, Energy:0 });
        let obj = map.get(d.Branch);
        obj.count++;
        obj.Sales += d.Sales || 0; obj.Product += d.Product || 0; obj.Waste += d.Waste || 0; 
        obj.Labour += d.Labour || 0; obj.ATV += d.ATV || 0; obj.Energy += d.Energy || 0;
    });
    return Array.from(map.values()).map(o => ({
        Branch: o.Branch, AM: o.AM,
        Sales: o.Sales/o.count, Product: o.Product/o.count, Waste: o.Waste/o.count, 
        Labour: o.Labour/o.count, ATV: o.ATV/o.count, Energy: o.Energy/o.count
    }));
}

async function drawTrendChart() {
    const rawKpis = await idbGetAll('kpi');
    if(!rawKpis.length) return;

    const metric = document.getElementById('trendMetric').value;
    const scope = document.getElementById('trendScope').value;

    const weeks = [...new Set(rawKpis.map(k => k.Week))].sort((a,b) => a - b);
    
    const dataPoints = weeks.map(w => {
        let weekData = rawKpis.filter(k => k.Week === w);
        if (scope !== 'Network') weekData = weekData.filter(k => k.AM === scope);
        if (scope === 'Network') weekData = weekData.filter(k => k.AM !== 'Unassigned');
        if(!weekData.length) return null;
        
        const avg = weekData.reduce((sum, item) => sum + (item[metric] || 0), 0) / weekData.length;
        if(['Sales', 'Product', 'Waste', 'Labour'].includes(metric)) return (avg * 100).toFixed(1);
        return avg.toFixed(2);
    });

    const canvas = document.getElementById('trendCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    
    if(trendChartInstance) trendChartInstance.destroy();

    const isInverse = ['Waste', 'Labour', 'Energy'].includes(metric);
    const lineColor = isInverse ? '#F59E0B' : '#00A88E';
    const bgColor = isInverse ? 'rgba(245, 158, 11, 0.1)' : 'rgba(0, 168, 142, 0.1)';

    trendChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: weeks.map(w => 'Week ' + w),
            datasets: [{
                label: `${metric} - ${scope}`,
                data: dataPoints,
                borderColor: lineColor,
                backgroundColor: bgColor,
                borderWidth: 3,
                pointBackgroundColor: '#ffffff',
                pointBorderColor: lineColor,
                pointBorderWidth: 2,
                pointRadius: 5,
                pointHoverRadius: 7,
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
                y: { grid: { color: '#e2e8f0' }, ticks: { font: { family: 'Inter', weight: 'bold' }, color: '#64748b' } },
                x: { grid: { display: false }, ticks: { font: { family: 'Inter', weight: 'bold' }, color: '#64748b' } }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    titleFont: { family: 'Inter', size: 13, weight: 'bold' },
                    bodyFont: { family: 'Inter', size: 14, weight: 'bold' },
                    padding: 12, cornerRadius: 8,
                    callbacks: {
                        label: function(context) {
                            let val = context.parsed.y;
                            if(['Sales', 'Product', 'Waste', 'Labour'].includes(metric)) return val + '%';
                            if(metric === 'ATV') return '£' + val;
                            return val + ' kWh';
                        }
                    }
                }
            }
        }
    });
}

async function renderDashboard(){
  if(currentView === 'control') return renderControlPanel();
  if(currentView === 'trends') return renderTrendsPanel();

  const rawKpis = await idbGetAll('kpi'); 
  const allAudits = await idbGetAll('audits'); 
  const allActions = await idbGetAll('actions');

  if(!rawKpis.length && currentView !== 'control') return;
  
  latestWkGlobal = Math.max(...rawKpis.map(k => k.Week));
  
  let curr = [], prev = [];
  let currAudits = [], prevAudits = [];
  let currActions = [], prevActions = [];
  
  if (currentTimeFilter === 'latest') {
      curr = aggregateData(rawKpis.filter(k => k.Week === latestWkGlobal));
      prev = aggregateData(rawKpis.filter(k => k.Week === latestWkGlobal - 1));
      currAudits = allAudits.filter(a => a.Week === latestWkGlobal);
      prevAudits = allAudits.filter(a => a.Week === latestWkGlobal - 1);
      currActions = allActions.filter(a => a.Week === latestWkGlobal);
      prevActions = allActions.filter(a => a.Week === latestWkGlobal - 1);
  } else if (currentTimeFilter === 'last4') {
      curr = aggregateData(rawKpis.filter(k => k.Week <= latestWkGlobal && k.Week > latestWkGlobal - 4));
      prev = aggregateData(rawKpis.filter(k => k.Week <= latestWkGlobal - 4 && k.Week > latestWkGlobal - 8));
      currAudits = allAudits.filter(a => a.Week <= latestWkGlobal && a.Week > latestWkGlobal - 4);
      prevAudits = allAudits.filter(a => a.Week <= latestWkGlobal - 4 && a.Week > latestWkGlobal - 8);
      currActions = allActions.filter(a => a.Week <= latestWkGlobal && a.Week > latestWkGlobal - 4);
      prevActions = allActions.filter(a => a.Week <= latestWkGlobal - 4 && a.Week > latestWkGlobal - 8);
  } else if (currentTimeFilter === 'ytd') {
      curr = aggregateData(rawKpis); 
      prev = []; 
      currAudits = allAudits; prevAudits = [];
      currActions = allActions; prevActions = [];
  }
  
  const aggAudits = new Map();
  currAudits.forEach(a => {
      const id = a.Store.trim().toLowerCase();
      if(!aggAudits.has(id)) aggAudits.set(id, {Store: a.Store, count:0, Score:0, Food:0, Fire:0, HandS:0, Journey:0, Coffee:0, Focus:0});
      const obj = aggAudits.get(id);
      obj.count++; obj.Score += a.Score||0; obj.Food += a.Food||0; obj.Fire += a.Fire||0;
      obj.HandS += a.HandS||0; obj.Journey += a.Journey||0; obj.Coffee += a.Coffee||0; obj.Focus += a.Focus||0;
  });
  const auditMap = new Map();
  aggAudits.forEach((v, k) => auditMap.set(k, {
      Score: v.Score/v.count, Food: v.Food/v.count, Fire: v.Fire/v.count, HandS: v.HandS/v.count, 
      Journey: v.Journey/v.count, Coffee: v.Coffee/v.count, Focus: v.Focus/v.count
  }));

  const bAvgSales = curr.reduce((a,b)=>a+(b.Sales||0),0) / (curr.length || 1);
  const pbAvgSales = prev.reduce((a,b)=>a+(b.Sales||0),0) / (prev.length || 1);
  const bAvgProduct = curr.reduce((a,b)=>a+(b.Product||0),0) / (curr.length || 1);
  const pbAvgProduct = prev.reduce((a,b)=>a+(b.Product||0),0) / (prev.length || 1);
  const bAvgWaste = curr.reduce((a,b)=>a+(b.Waste||0),0) / (curr.length || 1);
  const pbAvgWaste = prev.reduce((a,b)=>a+(b.Waste||0),0) / (prev.length || 1);
  const bAvgLabour = curr.reduce((a,b)=>a+(b.Labour||0),0) / (curr.length || 1);
  const pbAvgLabour = prev.reduce((a,b)=>a+(b.Labour||0),0) / (prev.length || 1);
  const bAvgEnergy = curr.reduce((a,b)=>a+(b.Energy||0),0) / (curr.length || 1);
  const pbAvgEnergy = prev.reduce((a,b)=>a+(b.Energy||0),0) / (prev.length || 1);
  const bAvgATV = curr.reduce((a,b)=>a+(b.ATV||0),0) / (curr.length || 1);
  const pbAvgATV = prev.reduce((a,b)=>a+(b.ATV||0),0) / (prev.length || 1);
  const bAvgAudit = Array.from(auditMap.values()).reduce((a,b)=>a+(b.Score||0),0) / (auditMap.size || 1);

  const calcCriticals = (auditList) => {
      let critCount = 0;
      auditList.forEach(a => {
          if (a.Food < 90 || a.Fire < 90 || a.HandS < 90 || a.Journey < 90 || a.Coffee < 90 || a.Focus < 90) critCount++;
      });
      return critCount;
  };
  const currCrits = calcCriticals(currAudits);
  const prevCrits = calcCriticals(prevAudits);

  const calcCloseRate = (actionsList) => {
      let closedCount = 0;
      let totalDays = 0;
      actionsList.forEach(a => {
          if(a.Status.includes('close') && a.DaysToClose !== null) {
              closedCount++;
              totalDays += a.DaysToClose;
          }
      });
      return closedCount > 0 ? (totalDays / closedCount) : 0;
  };
  const currCloseAvg = calcCloseRate(currActions);
  const prevCloseAvg = calcCloseRate(prevActions);

  const qMap = new Map();
  currActions.forEach(a => {

  const topFailures = Array.from(qMap.entries()).sort((a,b) => b[1] - a[1]).slice(0, 3);

      return { 
          am, score: compScore, sAvg: avg('Sales'), pAvg: avg('Product'), wAvg: avg('Waste'), 
          lAvg: avg('Labour'), aAvg: aAvg, eAvg: avg('Energy'), atvAvg: avg('ATV')

  const overallWinner = amStatsGlobal[0]?.am;
  const bestSalesAM = [...amStatsGlobal].sort((a,b)=>b.sAvg-a.sAvg)[0]?.am;
  const bestProductAM = [...amStatsGlobal].sort((a,b)=>b.pAvg-a.pAvg)[0]?.am;

  const bestEnergyAM = [...amStatsGlobal].sort((a,b)=>a.eAvg-b.eAvg)[0]?.am;
  const bestAuditAM = [...amStatsGlobal].sort((a,b)=>b.aAvg-a.aAvg)[0]?.am;

  if(currentView === 'overview'){
    const filterLabel = currentTimeFilter === 'latest' ? `Wk ${latestWkGlobal}` : currentTimeFilter === 'last4' ? 'Rolling 4 Weeks' : 'Year to Date';
    const areaRows = amStatsGlobal.map((am, i) => `

        <div class="flex items-center gap-3">
          <span class="w-6 h-6 rounded-full ${i===0?'bg-emerald-100 text-emerald-700': i===1?'bg-slate-100 text-slate-700': i===2?'bg-amber-100 text-amber-700':'bg-slate-50 text-slate-400'} flex items-center justify-center text-[10px] font-black">${i+1}</span>

          <span class="w-16 text-emerald-600">${(am.sAvg*100).toFixed(1)}% <span class="text-[9px] text-slate-400 font-normal block">Sales</span></span>
          <span class="w-16 text-indigo-600">${(am.lAvg*100).toFixed(1)}% <span class="text-[9px] text-slate-400 font-normal block">Labour</span></span>
          <span class="w-16 text-slate-700">${am.aAvg.toFixed(1)}% <span class="text-[9px] text-slate-400 font-normal block">Audit</span></span>
        </div>
      </div>

    const progColor = (val) => val >= 95 ? 'progress-fill' : val >= 90 ? 'progress-fill-warn' : 'progress-fill-crit';

    let actionsHtml = topFailures.length > 0 ? topFailures.map((f, idx) => `
        <div class="text-[10px] border-b border-indigo-100 pb-1 mb-1 last:border-0 last:mb-0 last:pb-0">
            <span class="font-bold text-indigo-800">${idx+1}.</span> ${f[0]} <span class="font-bold text-indigo-500 float-right">(${f[1]}x)</span>
        </div>
    `).join('') : '<p class="text-xs text-slate-500 italic">No action data found for this period.</p>';

        </div>

      <div class="grid grid-cols-1 gap-10 pb-20">${byAM}</div>`;

    const prevByAM = {};
    prev.forEach(p=>{ if(!prevByAM[p.AM]) prevByAM[p.AM]={total:0,count:0}; prevByAM[p.AM].total += p.Sales; prevByAM[p.AM].count++; });
    const improvedArea = amStatsGlobal.map(a=>{

    }).sort((a,b)=>b.change-a.change)[0];

    const improvedAreaHtml = `<div class="card p-4 text-center mb-4"><h4 class="text-xs font-black muted uppercase mb-1">🚀 Most Improved Area</h4><div class="text-base font-black birds-green">🥇 ${improvedArea?.name || '-'}</div><div class="text-xs text-emerald-600 font-bold">+${((improvedArea?.change||0)*100).toFixed(1)}%</div></div>`;

    const rankMetric = (metric, asc) => [...amStatsGlobal].sort((a,b) => asc ? a[metric] - b[metric] : b[metric] - a[metric]).slice(0,3);
    const buildSubPodium = (title, metric, asc, fmt, displayMode) => {
      const ranked = rankMetric(metric, asc);
      const formatVal = (val) => {
        if (displayMode === 'currency') return '£' + (val || 0).toFixed(2);
        return ((val || 0) * 100).toFixed(fmt) + '%';
      };
      return `

            <div class="flex-1 text-[11px] pb-1 border-b-2 border-birds-green">👑 <b>1st</b><br>${ranked[0]?.am || '—'}<br>${formatVal(ranked[0]?.[metric])}</div>

          </div>
        </div>`;
    };

    document.getElementById('mainView').innerHTML = `
      <div id="winners-card" class="pb-2">
        ${improvedAreaHtml}
        <div class="card p-8 mb-6 text-center relative">

    const rows = sorted.map((r, i) => {
      return `<tr class="border-b border-slate-100 text-[11px] hover:bg-slate-50"><td class="p-3 font-black">${i+1}</td><td class="p-3 font-bold">${r.Branch}</td><td class="p-3 text-slate-500">${r.AM}</td><td class="p-3 font-bold birds-green">${(r.Sales*100).toFixed(1)}%</td><td class="p-3">${(r.Labour*100).toFixed(1)}%</td><td class="p-3">${(auditMap.get(r.Branch.trim().toLowerCase())?.Score||0).toFixed(1)}%</td></tr>`;
    }).join('');
    document.getElementById('mainView').innerHTML = `<div class="card overflow-x-auto"><table class="w-full text-left"><thead><tr><th class="p-3">Rank</th><th class="p-3">Store</th><th class="p-3">Area</th><th class="p-3">Sales</th><th class="p-3">Labour</th><th class="p-3">Audit</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
}

function renderControlPanel() {
    let rows = '';
    Array.from(storeMap.entries()).sort().forEach(([branchId, currentAM]) => {
        const origName = originalStoreNames.get(branchId) || branchId;
        let options = AM_LIST.map(am => `<option value="${am}" ${am === currentAM ? 'selected' : ''}>${am}</option>`).join('');
        rows += `<div class="flex justify-between items-center border-b border-slate-100 py-3"><span class="font-bold text-sm">${origName}</span><select onchange="updateStoreAM('${branchId}', this.value)" class="p-1 border rounded text-sm">${options}</select></div>`;
    });
    document.getElementById('mainView').innerHTML = `<div class="card p-6 max-w-2xl mx-auto"><h2 class="text-xl font-black birds-green mb-6">Allocation Matrix</h2>${rows}</div>`;
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('nav button').forEach(b => {
    b.className = (b.id === `btn-${v}`) ? 'seg-btn seg-btn-active flex-1' : 'seg-btn flex-1';
  });
  renderDashboard();
}
</script>
</body>
</html>
