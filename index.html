  <script>
    async function exportVisibleViewAsZip(){
      let cards = [];
      if(currentView === 'overview') {
        const o = document.getElementById('overview-card');
        if(o) cards = [o];
      } else if(currentView === 'winners') {
        const w = document.getElementById('winners-card');
        if(w) cards = [w];
      } else if(currentView === 'halloffame') {
        const y = document.getElementById('ytd-card');
        if(y) cards = [y];
      } else if(currentView === 'areas') {
        cards = Array.from(document.querySelectorAll('.area-card-export'));
      } else {
        const mv = document.getElementById('mainView');
        if(mv) cards = [mv];
      }
      if(!cards.length){ alert('Nothing to export on this view'); return; }
      const zip = new JSZip();
      let idx = 1;
      for(const card of cards){
        const btn = card.querySelector('.export-btn');
        if(btn) btn.style.display = 'none';
        card.classList.add('export-force-landscape');
        const canvas = await renderElementToCanvas(card, { forceWidth: 1400 });
        const img = canvas.toDataURL('image/png').split(',')[1];
        const baseName = (currentView === 'overview') ? 'Overview'
                      : (currentView === 'winners') ? 'Winners'
                      : (currentView === 'halloffame') ? 'YTD_Awards'
                      : `Card_${idx}`;
        zip.file(`${baseName}.png`, img, { base64: true });
        idx++;
        if(btn) btn.style.display = 'flex';
        card.classList.remove('export-force-landscape');
      }
      const blob = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `Birds_${currentView}_${currentTimeFilter}.zip`;
      a.click();
    }
  </script>

// Database version upgraded to v32 to enforce schema rebuild
const req = indexedDB.open('BirdsExecutiveHub_v32', 1);
req.onupgradeneeded = e => {
  const d = e.target.result;
  if(!d.objectStoreNames.contains('kpi')) d.createObjectStore('kpi', { keyPath: ['Branch','Year','Week'] });
  if(!d.objectStoreNames.contains('audits')) d.createObjectStore('audits', { keyPath: ['Store','Year','Week'] });
  if(!d.objectStoreNames.contains('stores')) d.createObjectStore('stores', { keyPath: 'BranchId' });
  if(!d.objectStoreNames.contains('actions')) d.createObjectStore('actions', { keyPath: 'ActionID', autoIncrement: true });
  if(!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'id' });
  if(!d.objectStoreNames.contains('area_winners_log')) d.createObjectStore('area_winners_log', { keyPath: ['Year','Week'] });
  if(!d.objectStoreNames.contains('area_metric_winners_log')) d.createObjectStore('area_metric_winners_log', { keyPath: ['Year','Week','Metric'] });
  if(!d.objectStoreNames.contains('store_winners_log')) d.createObjectStore('store_winners_log', { keyPath: ['Year','Week','Metric','Branch'] });
  if(!d.objectStoreNames.contains('ingest_log')) d.createObjectStore('ingest_log', { keyPath: 'id', autoIncrement: true });
};
req.onsuccess = async e => { 
    db = e.target.result; 
    await loadStoreMap();
    await loadDirectoryHandle();
    renderDashboard();
};

const idbGetAll = (s) => new Promise(res => { const r = db.transaction(s).objectStore(s).getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => res([]); });
const idbAdd = (s, v) => new Promise(res => { try{ const r = db.transaction(s,'readwrite').objectStore(s).add(v); r.onsuccess = () => res(r.result); r.onerror = () => res(null); } catch(e){ res(null); }});
const idbPut = (s, v) => new Promise(res => { const r = db.transaction(s,'readwrite').objectStore(s).put(v); r.onsuccess = () => res(true); r.onerror = (err) => { console.error('DB Put Error', err); res(false); }; });
const idbClear = (s) => new Promise(res => { const r = db.transaction(s,'readwrite').objectStore(s).clear(); r.onsuccess = () => res(true); r.onerror = () => res(false); });

async function loadStoreMap() {
    const stores = await idbGetAll('stores');
    if (stores.length === 0) {
        for (const [am, branches] of Object.entries(DEFAULT_AREA_MAPPING)) {
            for (const b of branches) {
                let lowerId = b.trim().toLowerCase();
                await idbPut('stores', { BranchId: lowerId, originalName: b, AM: am });
                storeMap.set(lowerId, am);
                originalStoreNames.set(lowerId, b);
            }
        }
    } else {
        stores.forEach(s => {
            storeMap.set(s.BranchId, s.AM);
            originalStoreNames.set(s.BranchId, s.originalName);
        });
    }
}

async function updateStoreAM(branchId, newAM) {
    const origName = originalStoreNames.get(branchId);
    await idbPut('stores', { BranchId: branchId, originalName: origName, AM: newAM });
    storeMap.set(branchId, newAM);
    if(currentView === 'control') renderDashboard();
}

async function addNewStore() {
    const nameInput = document.getElementById('newStoreName').value.trim();
    const amSelect = document.getElementById('newStoreAM').value;
    if(!nameInput) return alert("Please enter a store name.");
    
    const lowerId = nameInput.toLowerCase();
    await idbPut('stores', { BranchId: lowerId, originalName: nameInput, AM: amSelect });
    storeMap.set(lowerId, amSelect);
    originalStoreNames.set(lowerId, nameInput);
    
    document.getElementById('newStoreName').value = '';
    renderDashboard();
    alert(`Store '${nameInput}' added successfully to ${amSelect}.`);
}

function parseVal(v){
  if(v === undefined || v === null || v === '') return 0;
  let s = String(v).trim();
  const m = s.match(/-?\d+(?:\.\d+)?/);
  if(!m) return 0;
  let num = parseFloat(m[0]);
  return s.includes('%') ? num/100 : num;
}
function normaliseStoreId(name){ return String(name||'').trim().toLowerCase(); }
function _finiteOr0(x){ x = Number(x); return Number.isFinite(x) ? x : 0; }
function _clamp(x, lo, hi){ x = _finiteOr0(x); return Math.max(lo, Math.min(hi, x)); }

function _fixRatio(v, {allowNegative=false} = {}){
  v = _finiteOr0(v);
  if (!Number.isFinite(v)) return 0;
  if (Math.abs(v) > 1.5 && Math.abs(v) <= 200) v = v / 100;
  if (Math.abs(v) > 1.5 && Math.abs(v) <= 20000) v = v / 10000;
  if (Math.abs(v) > 1.5) v = 0;
  return _clamp(v, allowNegative ? -1 : 0, 1);
}

function _fixATV(v){ v = _finiteOr0(v); if (v < 0) v = 0; if (v > 100 && v <= 10000) v = v / 100; return _clamp(v, 0, 200); }
function _fixEnergy(v){ v = _finiteOr0(v); if (v < 0) v = Math.abs(v); if (v > 0 && v < 1) v = 0; return _clamp(v, 0, 50000); }
function _fixScore100(v){ v = _finiteOr0(v); if (v > 0 && v <= 1.5) v = v * 100; return _clamp(v, 0, 100); }

async function validateAndCorrectData(weeksTouched){
  try {
    const kpis = await idbGetAll('kpi');
    for (const rec of kpis) {
      if (Array.isArray(weeksTouched) && weeksTouched.length && !weeksTouched.includes(rec.Week)) continue;
      const fixed = { ...rec };
      if (fixed.__rawSales === undefined) fixed.__rawSales = rec.Sales;
      if (fixed.__rawProduct === undefined) fixed.__rawProduct = rec.Product;
      if (fixed.__rawWaste === undefined) fixed.__rawWaste = rec.Waste;
      if (fixed.__rawLabour === undefined) fixed.__rawLabour = rec.Labour;
      if (fixed.__rawATV === undefined) fixed.__rawATV = rec.ATV;
      if (fixed.__rawEnergy === undefined) fixed.__rawEnergy = rec.Energy;

      fixed.Sales = _fixRatio(rec.Sales, {allowNegative:true});
      fixed.Product = _fixRatio(rec.Product, {allowNegative:true});
      fixed.Waste = _fixRatio(rec.Waste, {allowNegative:false});
      fixed.Labour = _fixRatio(rec.Labour, {allowNegative:false});
      fixed.ATV = _fixATV(rec.ATV);
      fixed.Energy = _fixEnergy(rec.Energy);
      fixed.FilledRolls = _fixRatio(rec.FilledRolls, {allowNegative:true});
      fixed.Sandwiches = _fixRatio(rec.Sandwiches, {allowNegative:true});
      fixed.HotRolls = _fixRatio(rec.HotRolls, {allowNegative:true});
      fixed.HotBev = _fixRatio(rec.HotBev, {allowNegative:true});
      await idbPut('kpi', fixed);
    }
    const audits = await idbGetAll('audits');
    for (const rec of audits) {
      if (Array.isArray(weeksTouched) && weeksTouched.length && !weeksTouched.includes(rec.Week)) continue;
      const fixed = { ...rec };
      if (fixed.__rawScore === undefined) fixed.__rawScore = rec.Score;
      if (fixed.__rawFood === undefined) fixed.__rawFood = rec.Food;
      if (fixed.__rawFire === undefined) fixed.__rawFire = rec.Fire;
      if (fixed.__rawHandS === undefined) fixed.__rawHandS = rec.HandS;
      if (fixed.__rawJourney === undefined) fixed.__rawJourney = rec.Journey;
      if (fixed.__rawCoffee === undefined) fixed.__rawCoffee = rec.Coffee;
      if (fixed.__rawFocus === undefined) fixed.__rawFocus = rec.Focus;

      fixed.Score = _fixScore100(rec.Score);
      fixed.Food = _fixScore100(rec.Food);
      fixed.Fire = _fixScore100(rec.Fire);
      fixed.HandS = _fixScore100(rec.HandS);
      fixed.Journey = _fixScore100(rec.Journey);
      fixed.Coffee = _fixScore100(rec.Coffee);
      fixed.Focus = _fixScore100(rec.Focus);
      await idbPut('audits', fixed);
    }
  } catch (e) {
    console.warn('Post-ingest validation failed:', e);
  }
}

// THE NEW ANOMALY DETECTION ENGINE
async function flagAnomalies() {
    try {
        const kpis = await idbGetAll('kpi');
        const byBranch = {};
        
        kpis.forEach(k => {
            if (!byBranch[k.Branch]) byBranch[k.Branch] = [];
            byBranch[k.Branch].push(k);
        });

        for (const branch in byBranch) {
            // Sort chronologically to simulate timeline
            const stores = byBranch[branch].sort((a,b) => {
               if ((a.Year || 0) !== (b.Year || 0)) return (a.Year || 0) - (b.Year || 0);
               return (a.Week || 0) - (b.Week || 0);
            });
            
            let lastValidSales = null;
            
            for (let i = 0; i < stores.length; i++) {
               const curr = stores[i];
               let isAnomaly = false;
               
               // Rule 1: Missing Data or Closed Store (-100% variance, explicit 0 sales, or 0% labour)
               if (curr.Sales <= -0.90 || curr.__rawSales === 0 || curr.__rawSales === '0' || curr.Labour <= 0) {
                   isAnomaly = true;
               } 
               // Rule 2: Sudden 30%+ drop from "normal" expectations
               else if (lastValidSales !== null && Math.abs(curr.Sales - lastValidSales) >= 0.30) {
                   isAnomaly = true;
               }

               curr.IsAnomaly = isAnomaly;
               await idbPut('kpi', curr);

               // Rule 3: Baseline Memory Update
               // Only update the baseline if the week was "normal"
               if (!isAnomaly) {
                   lastValidSales = curr.Sales;
               }
            }
        }
    } catch (e) {
        console.warn('Anomaly flagging failed:', e);
    }
}

async function recordPersistentWinnersForWeeks(year, weeks){
  const kpis = await idbGetAll('kpi');
  const validAMs = AM_LIST.filter(a => a !== 'Unassigned');

  for(const week of weeks){
    // Exclude Anomaly weeks from ever winning an award
    const wkKpis = kpis.filter(k => (k.Year ?? year) === year && k.Week === week && k.AM !== 'Unassigned' && !k.IsAnomaly);
    if(!wkKpis.length) continue;

    const pWk = week === 1 ? 52 : week - 1;
    const pYr = week === 1 ? year - 1 : year;
    // Exclude anomalies from previous baseline comparisons
    const prevKpis = kpis.filter(k => (k.Year ?? pYr) === pYr && k.Week === pWk && k.AM !== 'Unassigned' && !k.IsAnomaly);

  try{
    const prevById = new Map(prevKpis.map(p=>[normaliseStoreId(p.Branch), p]));
    let bestMI = null;
    for(const c of wkKpis){
      const p = prevById.get(normaliseStoreId(c.Branch));
      if(!p) continue;
      const delta = (_finiteOr0(c.Sales) - _finiteOr0(p.Sales));
      if(!bestMI || delta > bestMI.delta) bestMI = { Branch: c.Branch, delta };
    }
    if(bestMI && bestMI.delta > 0){
      await idbPut('store_winners_log', { Year: year, Week: week, Metric: 'Most Improved', Branch: bestMI.Branch });
    }
  }catch(e){ console.warn('MostImproved skipped', e); }

    const metrics = [
      { id: 'Sales', order: 'desc' }, { id: 'Product', order: 'desc' },
      { id: 'Waste', order: 'asc' }, { id: 'Labour', order: 'asc' },
      { id: 'ATV', order: 'desc' }, { id: 'Energy', order: 'asc' }
    ];

    const areaImprovementPoints = {};
    validAMs.forEach(am => areaImprovementPoints[am] = 0);

    metrics.forEach(m => {
      const areaDeltas = validAMs.map(am => {
        const curr = wkKpis.filter(k => k.AM === am);
        const prev = prevKpis.filter(k => k.AM === am);
        if(!curr.length || !prev.length) return { am, gain: -999999 };
        const cAvg = curr.reduce((a,b) => a + (_finiteOr0(b[m.id])), 0) / curr.length;
        const pAvg = prev.reduce((a,b) => a + (_finiteOr0(b[m.id])), 0) / prev.length;
        const gain = m.order === 'desc' ? (cAvg - pAvg) : (pAvg - cAvg);
        return { am, gain };
      });
      areaDeltas.sort((a,b) => b.gain - a.gain);
      areaDeltas.forEach((item, idx) => { areaImprovementPoints[item.am] += (5 - idx); });
    });

    const winner = Object.entries(areaImprovementPoints).sort((a,b) => b[1] - a[1])[0];
    if(winner) { await idbPut('area_winners_log', { Year: year, Week: week, Winner: winner[0], Score: winner[1] }); }

    for(const am of validAMs){
      const areaStores = wkKpis.filter(k => k.AM === am);
      for(const m of metrics){
        let validStores = areaStores;
        if (m.order === 'asc') {
            validStores = areaStores.filter(x => _finiteOr0(x[m.id]) > 0);
        }
        
        if(!validStores.length) continue;
        const sorted = [...validStores].sort((a,b)=> m.order==='desc' ? (_finiteOr0(b[m.id])-_finiteOr0(a[m.id])) : (_finiteOr0(a[m.id])-_finiteOr0(b[m.id])) );
        if(sorted[0]) await idbPut('store_winners_log', { Year: year, Week: week, Metric: m.id, Branch: sorted[0].Branch });
      }
    }
  }
}

function _periodWeeks(period, latestWeek){
  const maxW = Math.max(1, latestWeek||1);
  if(period==='q1') return {from:1, to:Math.min(13,maxW)};
  if(period==='q2') return {from:14, to:Math.min(26,maxW)};
  if(period==='q3') return {from:27, to:Math.min(39,maxW)};
  if(period==='q4') return {from:40, to:Math.min(53,maxW)};
  return {from:1, to:maxW};
}

function findCols(rows){
  for(let r=0; r<Math.min(rows.length, 30); r++){
    if(!rows[r]) continue;
    let maxCols = Math.max(rows[r].length || 0, (rows[r+1] ? rows[r+1].length : 0) || 0);
    let headers = [];
    for(let c=0; c<maxCols; c++) {
      let h1 = String(rows[r][c] || '').toLowerCase().replace(/[^a-z0-9%]+/g, '');
      let h2 = (rows[r+1] && rows[r+1][c]) ? String(rows[r+1][c] || '').toLowerCase().replace(/[^a-z0-9%]+/g, '') : '';
      headers.push(h1 + h2);
    }
    const idxB = headers.findIndex(x => x === 'branch' || x === 'store' || x === 'shop' || x.includes('branchname') || x === 'name');
    if(idxB >= 0) {
      let hasSubHeader = rows[r+1] && rows[r+1].some(x => String(x).toLowerCase().includes('actual') || String(x).toLowerCase().includes('target'));
      let idxS = headers.findIndex(x => x.includes('salesdifference'));
      if(idxS === -1) {
          let actS = headers.findIndex(x => x.includes('actualsales') || x === 'sales');
          if(actS !== -1 && headers[actS+1] && headers[actS+1].includes('difference')) idxS = actS + 1;
      }
      let idxL = headers.findIndex(x => x.includes('wagesasa%') || x.includes('wagesas') || x.includes('labour%') || x.includes('wages%'));
      const baseProduct = headers.findIndex(x => x.includes('producttarget'));
      const baseFR = headers.findIndex(x => x.includes('filledrollsactual') || x.includes('filledrolls'));
      const baseSW = headers.findIndex(x => x.includes('sandwichesactual') || x.includes('sandwiches'));
      const baseHR = headers.findIndex(x => x.includes('filledrollhotactual') || x.includes('filledrollhot'));
      const baseHB = headers.findIndex(x => x.includes('hotbeverageactual') || x.includes('hotbeverage'));
      return {
        hr: hasSubHeader ? r + 1 : r, idxB: idxB, idxS: idxS,
        idxP: baseProduct >= 0 ? baseProduct + 2 : -1,
        idxW: headers.findIndex(x => x.includes('waste%') || x.includes('wastage') || x === 'waste'), 
        idxL: idxL, idxA: headers.findIndex(x => x.includes('atv') && !x.includes('target')), 
        idxE: headers.findIndex(x => x.includes('energy') || x.includes('green') || x.includes('kwh')),
        idxFR: baseFR >= 0 ? baseFR + 2 : -1, idxSW: baseSW >= 0 ? baseSW + 2 : -1,
        idxHR: baseHR >= 0 ? baseHR + 2 : -1, idxHB: baseHB >= 0 ? baseHB + 2 : -1
      };
    }
  }
  return null;
}

function parseDateSafe(val) {
    if(!val || String(val).includes('#')) return null;
    if(!isNaN(val) && Number(val) > 20000 && Number(val) < 100000) return new Date(Math.round((Number(val) - 25569)*86400*1000));
    let s = String(val).trim();
    let d = new Date(s);
    if(isNaN(d.getTime())) {
        const ukDateMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
        if(ukDateMatch) {
            let year = parseInt(ukDateMatch[3], 10);
            if(year < 100) year += 2000;
            return new Date(year, parseInt(ukDateMatch[2], 10) - 1, parseInt(ukDateMatch[1], 10));
        }
        return null;
    }
    return d;
}

const MAX_WEEK = 52; let __ingestMem = []; let __missingByYear = {};
function resolveWeekYear(fileName, wb){
  let week = 0; let year = 0; let evidence = [];
  const mW = fileName.match(/Wk\s*(\d{1,2})/i); if(mW){ week = parseInt(mW[1],10); evidence.push('filename:Wk'+week); }
  const mY = fileName.match(/(20\d{2})/); if(mY){ year = parseInt(mY[1],10); evidence.push('filename:'+year); }
  if(week && (week<1 || week>MAX_WEEK)) week = 0; if(year && year<2000) year = 0;
  return {week, year, evidence:evidence.join(',')};
}
function prevPair(week, year){ if(week===1) return {week:MAX_WEEK, year:year-1}; return {week:week-1, year:year}; }
async function logIngest(entry){ const e = Object.assign({ts:Date.now()}, entry||{}); __ingestMem.unshift(e); __ingestMem = __ingestMem.slice(0,400); try{ if(db && db.objectStoreNames.contains('ingest_log')) await idbAdd('ingest_log', e); }catch(err){} }
function computeMissingWeeks(seenByYear){ const missing = {}; Object.keys(seenByYear||{}).forEach(y=>{ const set = seenByYear[y]; const arr = Array.from(set||[]).sort((a,b)=>a-b); const max = arr.length ? arr[arr.length-1] : 0; const miss = []; for(let w=1; w<=max; w++){ if(!set.has(w)) miss.push(w); } if(miss.length) missing[y]=miss; }); return missing; }
function formatMissingBadge(m){ const years = Object.keys(m||{}); if(!years.length) return ''; return '⚠️ ' + years.map(y=>'Y'+y+': missing '+(m[y]||[]).length+'wk').join(' • '); }

async function syncData() {
  if (!directoryHandle) { alert("Please anchor a master folder first using 'Select Master Folder'."); return; }
  const hasPerm = await verifyPermission(directoryHandle, false);
  if(!hasPerm) { alert("Permission to read the folder was denied."); return; }
  document.getElementById('ingestStatus').innerText = "Scanning Folder... Please wait.";
  let cachedFiles = [];
  try {
      for await (const entry of directoryHandle.values()) {
          if (entry.kind === 'file' && entry.name.endsWith('.xlsx') && !entry.name.startsWith('~')) cachedFiles.push(await entry.getFile());
      }
  } catch (err) { alert("Could not scan directory. Ensure the folder still exists."); return; }
  if (cachedFiles.length === 0) { document.getElementById('ingestStatus').innerText = "No .xlsx files found in the selected folder."; return; }
  const weeksTouched = new Set(); const yearsTouched = new Set(); const seenWeeksByYear = {};

    await new Promise(r => setTimeout(r, 20));

      const resolved = resolveWeekYear(file.name, wb); const fileWk = resolved.week || 0; const fileYr = resolved.year || (new Date().getFullYear());
      yearsTouched.add(fileYr); if(!seenWeeksByYear[fileYr]) seenWeeksByYear[fileYr] = new Set();
      if(fileWk) seenWeeksByYear[fileYr].add(fileWk); currentAwardsYear = Math.max(currentAwardsYear || fileYr, fileYr);
      if(fileWk) weeksTouched.add(fileWk); if(fileWk > latestWkGlobal) latestWkGlobal = fileWk;

        const rows = weeklySheet ? XLSX.utils.sheet_to_json(weeklySheet, {header:1}) : []; const cols = findCols(rows);
        if(cols) {

              FilledRolls: cols.idxFR >= 0 ? parseVal(r[cols.idxFR]) : 0, Sandwiches: cols.idxSW >= 0 ? parseVal(r[cols.idxSW]) : 0,
              HotRolls: cols.idxHR >= 0 ? parseVal(r[cols.idxHR]) : 0, HotBev: cols.idxHB >= 0 ? parseVal(r[cols.idxHB]) : 0,
              IsAnomaly: false // Initialized safely
            });

                await idbPut('audits', { Store: rawStore, Week: sWk, Year: fileYr, Score: parseVal(r['Total score'] || r['Audit Score']) * (String(r['Total score']||'').includes('%')?100:1), Food: parseVal(r['Food safety']), Fire: parseVal(r['Fire safety']), HandS: parseVal(r['HandS ']), Journey: parseVal(r['Customer journey']), Coffee: parseVal(r['Coffee']), Focus: parseVal(r['Birds focus']) });
              }
            }
        }
        if(wb.Sheets['Data']) {
            const dataJson = XLSX.utils.sheet_to_json(wb.Sheets['Data']);
            for(const r of dataJson) {
                if(r.Question && r.Status) {
                    let dOpen = parseDateSafe(r.Date); let dClosed = parseDateSafe(r['Closed On']); let daysToClose = null;
                    if(dOpen && dClosed) { daysToClose = (dClosed - dOpen) / (1000 * 60 * 60 * 24); if(daysToClose < 0) daysToClose = 0; }
                    await idbPut('actions', { Week: sWk, StoreEmail: r['Store Email'], Category: r.Category, Question: r.Question, Status: String(r.Status).toLowerCase(), DaysToClose: daysToClose });
                }
            }
        }
      }
    } catch (innerErr) { console.warn(`Skipping file ${file.name} due to an error:`, innerErr); }
  }
  __missingByYear = computeMissingWeeks(seenWeeksByYear);
  const b = document.getElementById('missingWeeksBadge'); if(b) b.innerText = formatMissingBadge(__missingByYear);
  document.getElementById('ingestStatus').innerText = "Last Updated: " + new Date().toLocaleTimeString();
  
  await validateAndCorrectData(Array.from(weeksTouched));
  await flagAnomalies(); // THE NEW ANOMALY FIX

  for(const yr of Array.from(yearsTouched)) { await recordPersistentWinnersForWeeks(yr, Array.from(weeksTouched)); }
  renderDashboard();
}

function getTrendStr(currVal, prevVal, isInverse=false, format='percent') {
 if(prevVal === undefined || isNaN(prevVal) || currVal === prevVal) return `<div class="trend-wrap"><span class="trend-flat">—</span><div class="spark spark-flat"></div></div>`;
 const diff = currVal - prevVal; const absDiff = Math.abs(diff); let fmt = '';
 if(format === 'percent') fmt = `${(absDiff*100).toFixed(1)}%`; else if(format === 'currency') fmt = `£${absDiff.toFixed(2)}`; else if(format === 'whole') fmt = absDiff.toFixed(0); else if(format === 'decimal') fmt = absDiff.toFixed(1);
 const good = isInverse ? diff < 0 : diff > 0; const arrow = diff > 0 ? '▲' : '▼';
 return good ? `<div class="trend-wrap"><span class="trend-up">${arrow} ${fmt}</span><div class="spark spark-up"></div></div>` : `<div class="trend-wrap"><span class="trend-down">${arrow} ${fmt}</span><div class="spark spark-down"></div></div>`;
}

function aggregateData(dataArray) {
    const map = new Map();
    // THE NEW FILTER: Exclude anomalous weeks entirely from aggregations
    dataArray.filter(d => !d.IsAnomaly).forEach(d => {
        const branchId = d.Branch.trim().toLowerCase(); const am = storeMap.get(branchId) || 'Unassigned'; if(am === 'Unassigned') return;
        if(!map.has(d.Branch)) map.set(d.Branch, { Branch: d.Branch, AM: am, count:0, Sales:0, Product:0, Waste:0, Labour:0, ATV:0, Energy:0, FilledRolls:0, Sandwiches:0, HotRolls:0, HotBev:0 });
        let obj = map.get(d.Branch); obj.count++; obj.Sales += d.Sales || 0; obj.Product += d.Product || 0; obj.Waste += d.Waste || 0; obj.Labour += d.Labour || 0; obj.ATV += d.ATV || 0; obj.Energy += d.Energy || 0; obj.FilledRolls += d.FilledRolls || 0; obj.Sandwiches += d.Sandwiches || 0; obj.HotRolls += d.HotRolls || 0; obj.HotBev += d.HotBev || 0;
    });
    return Array.from(map.values()).map(o => ({ Branch: o.Branch, AM: o.AM, Sales: o.Sales/o.count, Product: o.Product/o.count, Waste: o.Waste/o.count, Labour: o.Labour/o.count, ATV: o.ATV/o.count, Energy: o.Energy/o.count, FilledRolls: o.FilledRolls/o.count, Sandwiches: o.Sandwiches/o.count, HotRolls: o.HotRolls/o.count, HotBev: o.HotBev/o.count }));
}

                <div class="kpi-row py-1.5"><span class="text-sm">🗑️ <b>Best Wastage</b></span><span class="text-sm text-right font-medium"><b>${bestWaste.Branch}</b> <span class="text-blue-600 font-bold">(${(bestWaste.Waste*100).toFixed(1)}%)</span></span></div>
                <div class="kpi-row py-1.5"><span class="text-sm">💷 <b>Lowest Labour %</b></span><span class="text-sm text-right font-medium"><b>${bestLabour.Branch}</b> <span class="text-indigo-600 font-bold">(${(bestLabour.Labour*100).toFixed(1)}%)</span></span></div>
                <div class="kpi-row py-1.5"><span class="text-sm">💰 <b>Best ATV</b></span><span class="text-sm text-right font-medium"><b>${bestATV.Branch}</b> <span class="text-emerald-600 font-bold">(£${(bestATV.ATV).toFixed(2)})</span></span></div>
                <div class="kpi-row py-1.5"><span class="text-sm">🔌 <b>Best Energy</b></span><span class="text-sm text-right font-medium"><b>${bestEnergy.Branch}</b> <span class="text-emerald-600 font-bold">(${(bestEnergy.Energy).toFixed(0)} kWh)</span></span></div>
              </div>
            </div>
            <div class="landscape-right">
              <h4 class="text-[11px] font-black muted uppercase mb-4 flex items-center gap-2"><div class="w-1 h-3 bg-teal-500 rounded-full"></div> Operational Sectors (Area Avg: ${aAvg.toFixed(1)}%)</h4>
              <div class="grid grid-cols-2 gap-x-6 gap-y-4 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                <div><div class="flex justify-between text-xs font-bold mb-1.5"><span>Food Safety</span><span class="${sFood<90?'text-red-500':sFood<95?'text-amber-500':''}">${sFood.toFixed(1)}%</span></div><div class="progress-bar h-2"><div class="${progColor(sFood)}" style="width:${sFood}%"></div></div></div>
                <div><div class="flex justify-between text-xs font-bold mb-1.5"><span>Fire Safety</span><span class="${sFire<90?'text-red-500':sFire<95?'text-amber-500':''}">${sFire.toFixed(1)}%</span></div><div class="progress-bar h-2"><div class="${progColor(sFire)}" style="width:${sFire}%"></div></div></div>
                <div><div class="flex justify-between text-xs font-bold mb-1.5"><span>H&S / Legal</span><span class="${sHandS<90?'text-red-500':sHandS<95?'text-amber-500':''}">${sHandS.toFixed(1)}%</span></div><div class="progress-bar h-2"><div class="${progColor(sHandS)}" style="width:${sHandS}%"></div></div></div>
                <div><div class="flex justify-between text-xs font-bold mb-1.5"><span>Cust. Journey</span><span class="${sJourney<90?'text-red-500':sJourney<95?'text-amber-500':''}">${sJourney.toFixed(1)}%</span></div><div class="progress-bar h-2"><div class="${progColor(sJourney)}" style="width:${sJourney}%"></div></div></div>
                <div><div class="flex justify-between text-xs font-bold mb-1.5"><span>Coffee Standard</span><span class="${sCoffee<90?'text-red-500':sCoffee<95?'text-amber-500':''}">${sCoffee.toFixed(1)}%</span></div><div class="progress-bar h-2"><div class="${progColor(sCoffee)}" style="width:${sCoffee}%"></div></div></div>
                <div><div class="flex justify-between text-xs font-bold mb-1.5"><span>Birds Focus</span><span class="${sFocus<90?'text-red-500':sFocus<95?'text-amber-500':''}">${sFocus.toFixed(1)}%</span></div><div class="progress-bar h-2"><div class="${progColor(sFocus)}" style="width:${sFocus}%"></div></div></div>
              </div>
              <div class="mt-8 p-4 bg-emerald-50 rounded-xl border border-emerald-100 flex items-start gap-3 relative group">
                <div class="h-8 w-8 bg-emerald-100 rounded-lg flex items-center justify-center font-bold text-emerald-600 shrink-0">💡</div>
                <div class="flex-1"><h5 contenteditable="true" class="text-xs font-black text-emerald-900 mb-1 outline-none border-b border-dashed border-emerald-200 focus:border-emerald-400 focus:bg-white pr-6 transition-all">Area Manager Note</h5><p contenteditable="true" class="text-[11px] text-emerald-800 leading-tight outline-none focus:bg-white focus:ring-1 focus:ring-emerald-300 p-1 rounded cursor-text italic transition-all">Current period performance shows <b>${am}</b> maintaining network-leading standards in operational compliance while driving top-tier commercial growth.</p></div>
                <button onclick="this.parentElement.remove()" class="export-btn absolute -top-2 -right-2 bg-white border border-red-100 text-red-400 hover:text-red-600 rounded-full w-6 h-6 flex items-center justify-center text-[12px] shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
    
    document.getElementById('mainView').innerHTML = `
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-black outfit birds-green tracking-tight">Area Executive Reports (Landscape Optimized)</h2>
        <button id="export-all-btn" onclick="exportAllCardsToZip()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-2xl font-black shadow-lg transition-all text-sm flex items-center gap-2">📦 Export All Landscape (ZIP)</button>
      </div>
      <div class="grid grid-cols-1 gap-10 pb-20">${byAM}</div>`;
  }

  if(currentView === 'winners'){
    const prevByAM = {}; prev.forEach(p=>{ if(!prevByAM[p.AM]) prevByAM[p.AM]={total:0,count:0}; prevByAM[p.AM].total += p.Sales; prevByAM[p.AM].count++; });
    const improvedArea = amStatsGlobal.map(a=>{ const prevAvg = prevByAM[a.am] ? prevByAM[a.am].total/prevByAM[a.am].count : 0; return {name:a.am, change:(a.sAvg - prevAvg)}; }).sort((a,b)=>b.change-a.change)[0];
    const rankMetric = (metric, asc) => [...amStatsGlobal].sort((a,b) => asc ? a[metric] - b[metric] : b[metric] - a[metric]).slice(0,3);
    const buildSubPodium = (title, metric, asc, fmt, displayMode) => {
      const ranked = rankMetric(metric, asc);
      const formatVal = (val) => { if (displayMode === 'currency') return '£' + (val || 0).toFixed(2); if (displayMode === 'whole') return (val || 0).toFixed(0); return ((val || 0) * 100).toFixed(fmt) + '%'; };
      return `<div class="card p-4 text-center"><h4 class="text-xs font-black muted uppercase mb-3">${title}</h4><div class="flex justify-between items-end gap-2"><div class="flex-1 text-[10px]"><b>2nd</b><br>${ranked[1]?.am || '—'}<br>${formatVal(ranked[1]?.[metric])}</div><div class="flex-1 text-[11px] pb-1 border-b-2 border-birds-green">👑 <b>1st</b><br>${ranked[0]?.am || '—'}<br>${formatVal(ranked[0]?.[metric])}</div><div class="flex-1 text-[10px]"><b>3rd</b><br>${ranked[2]?.am || '—'}<br>${formatVal(ranked[2]?.[metric])}</div></div></div>`;
    };
    const prevByStore = new Map(prev.map(p=>[p.Branch, p.Sales]));
    const improvedStore = curr.map(c=>{ const p = prevByStore.get(c.Branch) || 0; return {name: c.Branch, change: (c.Sales - p)}; }).sort((a,b)=>b.change-a.change)[0];
    const improvedStoreHtml = `
    <div class="card p-4 text-center mb-6 border-t-4 border-t-amber-400">
      <h4 class="text-xs font-black muted uppercase mb-1">🏬 Most Improved Store</h4>
      <div class="text-base font-black birds-green">🥇 ${improvedStore?.name || '-'}</div>
      <div class="text-xs text-emerald-600 font-bold">+${((improvedStore?.change||0)*100).toFixed(1)}%</div>
      <div class="text-[9px] text-slate-400 font-bold uppercase mt-1">Sales vs Prior Period</div>
    </div>`;
    document.getElementById('mainView').innerHTML = `
      <div id="winners-card" class="pb-2 relative">
        <div onclick="exportCard('winners-card', 'Winners')" class="export-btn absolute top-4 right-4 bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm">📸 Export Dash</div>
        ${improvedStoreHtml}
        <div class="card p-8 mb-6 text-center relative"><h2 class="font-black outfit birds-green text-2xl mb-8 mt-2">COMBINED AREA PODIUM</h2><div class="flex items-end gap-4 justify-center"><div class="card p-4 h-32 flex-1 border border-slate-200"><b>2nd</b><br>${amStatsGlobal[1]?.am || '—'}</div><div class="card p-6 h-48 flex-1 winner-1st shadow-lg">👑 <b>1st Overall</b><br><b class="text-xl">${amStatsGlobal[0]?.am || '—'}</b></div><div class="card p-4 h-24 flex-1 border border-slate-200"><b>3rd</b><br>${amStatsGlobal[2]?.am || '—'}</div></div></div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${buildSubPodium('Sales Growth', 'sAvg', false, 1, 'percent')}${buildSubPodium('Product Target', 'pAvg', false, 1, 'percent')}${buildSubPodium('Waste Control', 'wAvg', true, 1, 'percent')}${buildSubPodium('Labour Efficiency', 'lAvg', true, 1, 'percent')}${buildSubPodium('ATV Standings', 'atvAvg', false, 2, 'currency')}${buildSubPodium('Energy Usage', 'eAvg', true, 0, 'whole')}</div>
      </div>`;
  }

  if(currentView === 'leaderboard') {
    const baseWeek = (typeof effectiveWeek !== 'undefined') ? effectiveWeek : latestWkGlobal;
    let currLB = []; let prevLB = [];
    if(currentTimeFilter === 'latest') { currLB = aggregateData(rawKpis.filter(k => k.Week === baseWeek)); prevLB = aggregateData(rawKpis.filter(k => k.Week === (baseWeek - 1))); }
    else if(currentTimeFilter === 'last4') { currLB = aggregateData(rawKpis.filter(k => k.Week <= baseWeek && k.Week > baseWeek - 4)); prevLB = aggregateData(rawKpis.filter(k => k.Week <= baseWeek - 4 && k.Week > baseWeek - 8)); }
    else { currLB = aggregateData(rawKpis); prevLB = []; }

    const getCompScore = (k) => ((k.Sales||0)*100) + ((k.Product||0)*100) - ((k.Waste||0)*100) - ((k.Labour||0)*100) + (k.ATV||0) - ((k.Energy||0)/100);

    const currSorted = [...currLB].sort((a,b)=> getCompScore(b) - getCompScore(a)); 
    const prevSorted = [...prevLB].sort((a,b)=> getCompScore(b) - getCompScore(a)); 
    const prevRank = new Map(prevSorted.map((r,i)=>[r.Branch, i+1]));

    const rows = currSorted.map((r,i)=>{
      const nowRank = i+1; const wasRank = prevRank.get(r.Branch); let delta = '<span class="text-slate-300 font-black">—</span>';
      if(wasRank && wasRank !== nowRank) { const diff = wasRank - nowRank; if(diff > 0) delta = `<span class="text-emerald-600 font-black">▲ ${diff}</span>`; else delta = `<span class="text-red-600 font-black">▼ ${Math.abs(diff)}</span>`; }
      return `<tr class="border-b border-slate-100 text-[11px] hover:bg-slate-50">
        <td class="p-3 font-black">${nowRank}</td>
        <td class="p-3">${delta}</td>
        <td class="p-3 font-bold">${r.Branch}</td>
        <td class="p-3 text-slate-500">${r.AM}</td>
        <td class="p-3 font-black text-indigo-600">${getCompScore(r).toFixed(1)}</td>
        <td class="p-3 font-bold birds-green">${(r.Sales*100).toFixed(1)}%</td>
        <td class="p-3">${(r.Labour*100).toFixed(1)}%</td>
        <td class="p-3">${(r.Energy).toFixed(0)} kWh</td>
      </tr>`;
    }).join('');

    document.getElementById('mainView').innerHTML = `
      <div class="card overflow-x-auto relative max-h-[600px] overflow-y-auto shadow-inner border border-slate-200">
        <table class="w-full text-left relative">
          <thead class="sticky top-0 bg-slate-50 z-10 shadow-sm border-b border-slate-200">
            <tr>
              <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Rank</th>
              <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Δ</th>
              <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Store</th>
              <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Area</th>
              <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Comp Score</th>
              <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Sales</th>
              <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Labour</th>
              <th class="p-3 text-[10px] uppercase text-slate-500 font-black">Energy</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }
}

function renderControlPanel() {
    let rows = ''; const sortedStores = Array.from(storeMap.entries()).sort((a,b) => a[0].localeCompare(b[0]));
    sortedStores.forEach(([branchId, currentAM]) => {
        const origName = originalStoreNames.get(branchId) || branchId; let options = AM_LIST.map(am => `<option value="${am}" ${am === currentAM ? 'selected' : ''}>${am}</option>`).join('');
        rows += `<div class="flex justify-between items-center border-b border-slate-100 py-3 hover:bg-slate-50 transition-colors px-2 rounded"><span class="font-bold text-slate-800 text-sm w-1/2">${origName}</span><select onchange="updateStoreAM('${branchId}', this.value)" class="p-1.5 border border-slate-200 rounded-lg text-sm bg-white shadow-sm w-1/2 focus:ring-2 focus:ring-birds-green outline-none">${options}</select></div>`;
    });
    document.getElementById('mainView').innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="col-span-1">
              <div class="card p-6 mb-6">
                <h2 class="text-xl font-black birds-green mb-4">Add New Store</h2>
                <p class="text-xs text-slate-500 mb-4">Add an upcoming store to allocate it to an Area Manager immediately.</p>
                <div class="flex flex-col gap-3">
                  <input type="text" id="newStoreName" placeholder="Enter Store Name..." class="border border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-birds-green outline-none w-full shadow-sm">
                  <select id="newStoreAM" class="border border-slate-200 p-2.5 rounded-xl text-sm bg-white shadow-sm focus:ring-2 focus:ring-birds-green outline-none w-full">${AM_LIST.map(a => `<option value="${a}">${a}</option>`).join('')}</select>
                  <button onclick="addNewStore()" class="bg-birds hover:bg-emerald-600 text-white px-4 py-2.5 rounded-xl font-bold shadow-md transition-all mt-2">➕ Add to System</button>
                </div>
              </div>
            </div>
            <div class="col-span-2"><div class="card p-6 h-full"><div class="flex justify-between items-center mb-6"><h2 class="text-xl font-black birds-green">Store Allocation Matrix</h2><span class="text-xs font-bold bg-slate-100 text-slate-600 px-3 py-1 rounded-full">${sortedStores.length} Stores</span></div><div class="max-h-[600px] overflow-y-auto pr-2">${rows}</div></div></div>
        </div>
    `;
}

function setView(v) { currentView = v; document.querySelectorAll('nav button').forEach(b => { b.className = (b.id === `btn-${v}`) ? 'seg-btn seg-btn-active flex-1 whitespace-nowrap' : 'seg-btn flex-1 whitespace-nowrap'; }); renderDashboard(); }
</script>
</body>
</html>
